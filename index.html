<script>
    // 進入網頁與音樂
    function closeWelcome() {
        document.getElementById('welcome-overlay').classList.add('fade-out');
        const audio = document.getElementById('bg-audio');
        audio.play().catch(() => console.log("等待手動播放"));
    }

    // 卡片觀察器
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
            if (entry.isIntersecting) {
                setTimeout(() => entry.target.classList.add('show'), (index % 4) * 150);
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.card').forEach(card => observer.observe(card));

    // 會考倒數 + 進度條邏輯
    function updateExamCountdown() {
        const startDate = new Date(2025, 7, 30, 8, 0, 0).getTime(); // 2025/08/30 開始倒數
        const examDate = new Date(2026, 4, 16, 8, 0, 0).getTime();  // 2026/05/16 考試
        const now = new Date().getTime();
        
        const totalDuration = examDate - startDate;
        const timePassed = now - startDate;
        const distance = examDate - now;

        if (distance < 0) {
            document.querySelector('.countdown-title').innerText = "💪 322 金榜題名！";
            document.getElementById('timer').style.display = 'none';
            document.getElementById('progress-fill').style.width = "100%";
            document.getElementById('progress-text').innerText = "戰鬥結束！";
            return;
        }

        // 更新時間數字
        document.getElementById('days').innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
        document.getElementById('hours').innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        document.getElementById('minutes').innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        document.getElementById('seconds').innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');

        // 更新進度條百分比
        let progress = (timePassed / totalDuration) * 100;
        progress = Math.max(0, Math.min(100, progress));
        document.getElementById('progress-fill').style.width = progress.toFixed(2) + "%";
        document.getElementById('progress-text').innerText = `時間已消耗：${progress.toFixed(2)}% (各位憨包撐住！)`;
    }

    setInterval(updateExamCountdown, 1000);
    updateExamCountdown();
</script>

</body>
