<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>322 憨包們</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            --header-color: #0288d1;
            --card-bg: white;
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            /* 擴大漸層範圍，讓動畫有空間跑 */
            background: linear-gradient(-45deg, #e3f2fd, #bbdefb, #90caf9, #e1f5fe);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; /* 15秒循環一次 */
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
                }

        header {
            text-align: center;
            padding: 50px 0;
        }

        h1 { 
            color: var(--header-color); 
            margin: 0; 
            font-size: 2.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding-bottom: 120px; /* 為底部播放器留空間 */
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
            text-align: center;
            padding-bottom: 25px;
            position: relative;
        }

        .card:hover { 
            transform: translateY(-15px) scale(1.03); 
            box-shadow: 0 20px 40px rgba(2, 136, 209, 0.3);
            z-index: 10;
        }

        .photo-container {
            width: 100%;
            height: 280px; 
            overflow: hidden;
            background-color: #f1f1f1;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: transform 0.6s ease;
        }

        .card:hover .photo-container img {
            transform: scale(1.1);
        }

        .info { padding: 20px; }
        
        .name { 
            font-size: 1.5rem; 
            font-weight: bold; 
            margin-bottom: 8px; 
            color: #333; 
        }
        
        .nickname-tag { 
            display: inline-block;
            color: #0288d1; 
            background-color: #e1f5fe;
            padding: 4px 15px;
            border-radius: 10px;
            font-size: 0.95rem; 
            margin-bottom: 20px; 
            font-weight: 500;
        }

        .btn-ig {
            display: inline-block;
            background: var(--ig-gradient);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: opacity 0.2s;
        }

        .btn-ig:hover { opacity: 0.9; }

        /* 音樂播放器樣式 */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 9999;
            border: 1px solid #e1f5fe;
            text-align: center;
        }

        .music-player p {
            margin: 0 0 8px 0;
            font-size: 0.85rem;
            color: #0288d1;
            font-weight: bold;
        }

        audio { height: 30px; width: 210px; }

        footer {
            text-align: center;
            padding: 40px 0;
            color: #78909c;
            font-size: 0.9rem;
        }

        /* 手機版適應 RWD */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 15px;
                padding: 10px;
            }
            .music-player {
                width: calc(100% - 40px);
                right: 20px;
                left: 20px;
                bottom: 10px;
                padding: 10px;
            }
            audio { width: 100%; }
        }
    </style>
</head>
