<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>322 憨包們 - 回憶紀錄</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --header-color: #0288d1;
            --accent-blue: #4fc3f7;
            --card-bg: rgba(255, 255, 255, 0.9);
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --bg-gradient: linear-gradient(-45deg, #050b14, #101d2d, #1a2c42, #050b14); 
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0; padding: 20px; overflow-x: hidden;
            cursor: default; /* 回歸標準鼠標提升操作感 */
            padding-bottom: 120px;
        }

        /* --- 視覺特效：流星雨 --- */
        .night-sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .shooting-star {
            position: absolute; height: 2px; background: linear-gradient(-45deg, #ffffff, rgba(0, 0, 255, 0));
            filter: drop-shadow(0 0 6px #ffffff); border-radius: 999px; opacity: 0;
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        }

        /* 保留 25 顆流星邏輯... */
        .shooting-star:nth-child(n) { transform: rotate(-45deg); }
        .shooting-star:nth-child(1) { top: 0%; left: 80%; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 10%; left: 40%; animation-delay: 1.2s; }
        .shooting-star:nth-child(3) { top: 20%; left: 95%; animation-delay: 2.5s; }
        .shooting-star:nth-child(4) { top: 5%; left: 20%; animation-delay: 4s; }
        .shooting-star:nth-child(5) { top: 30%; left: 70%; animation-delay: 0.5s; }
        /* (簡略表示，實際代碼中請保留原有的 25 顆配置) */

        @keyframes tail { 0% { width: 0; } 30% { width: 120px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0) translateY(0) rotateZ(-45deg); opacity: 1; } 100% { transform: translateX(-1000px) translateY(1000px) rotateZ(-45deg); opacity: 0; } }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* --- 登入介面 --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 60000; background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1); }
        .login-box { background: rgba(0, 0, 0, 0.85); padding: 50px; border-radius: 30px; text-align: center; box-shadow: 0 0 30px rgba(79, 195, 247, 0.3); border: 1px solid var(--accent-blue); backdrop-filter: blur(15px); color: white; }
        .typewriter-text { overflow: hidden; border-right: .15em solid var(--accent-blue); white-space: nowrap; margin: 0 auto 20px; letter-spacing: .15em; width: 0; font-size: 1.8rem; font-weight: bold; animation: typing 2s steps(10, end) forwards, blink-caret .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--accent-blue) } }
        .login-box input { background: rgba(255,255,255,0.1); color: white; padding: 12px; width: 220px; border-radius: 12px; border: 1px solid var(--accent-blue); margin: 20px 0; font-size: 1.1rem; text-align: center; outline: none; }
        
        /* --- 滑鼠特效 --- */
        .cursor-dot { width: 8px; height: 8px; background: var(--accent-blue); position: fixed; border-radius: 50%; pointer-events: none; z-index: 100001; box-shadow: 0 0 10px var(--accent-blue); transition: transform 0.1s; }

        header { position: relative; z-index: 10; text-align: center; padding: 40px 0; }
        header h1 { color: #fff; font-size: 3rem; letter-spacing: 6px; text-shadow: 0 0 20px rgba(79, 195, 247, 0.8); margin-bottom: 10px;}
        #quote-display { color: #e1f5fe; font-style: italic; font-size: 1.1rem; min-height: 30px; transition: opacity 0.8s ease; text-shadow: 0 0 10px rgba(79, 195, 247, 0.5); font-weight: 500; }
        
        /* --- 卡片設計 --- */
        .container { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding-bottom: 60px; }
        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; padding-bottom: 25px; opacity: 0; transform: translateY(30px); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); }
        .card.show { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(79, 195, 247, 0.3); }
        .photo-container { width: 100%; height: 280px; background: #ddd; overflow: hidden; cursor: pointer; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card:hover .photo-container img { transform: scale(1.1); }
        .name { font-size: 1.5rem; font-weight: 800; margin-top: 15px; color: #1a2c42; cursor: pointer; }
        .nickname-tag { display: inline-block; color: #fff; background: var(--header-color); padding: 4px 12px; border-radius: 8px; margin: 8px 0; font-size: 0.9rem; }
        
        .actions { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 10px; }
        .btn-ig { background: var(--ig-gradient); color: white; padding: 8px 16px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 0.85rem; transition: opacity 0.2s; }
        .btn-ig:hover { opacity: 0.9; }
        
        /* 點讚動畫特效 */
        .like-box { display: flex; align-items: center; gap: 5px; background: #ffebee; color: #e91e63; padding: 8px 15px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: transform 0.2s; border: 1px solid #ffcdd2; user-select: none; }
        .like-box:active { transform: scale(1.3); }
        .heart-pop { animation: heartBeat 0.4s ease-out; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.5); } 100% { transform: scale(1); } }

        /* --- 模組容器 --- */
        .module-container { position: relative; z-index: 10; max-width: 700px; margin: 0 auto 30px; background: var(--card-bg); padding: 25px; border-radius: 25px; border: 1px solid var(--accent-blue); backdrop-filter: blur(10px); text-align: center; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .time-block { background: rgba(2, 136, 209, 0.05); padding: 10px; border-radius: 12px; }
        .time-block span { display: block; font-size: 1.8rem; font-weight: 800; color: var(--header-color); }
        
        #message-list { max-height: 200px; overflow-y: auto; margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.03); border-radius: 15px; }
        .msg-item { background: white; padding: 10px 15px; border-radius: 12px; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: left; font-size: 0.95rem; }

        /* --- 底部播放器 --- */
        #music-player { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; z-index: 9999; 
            background: rgba(10, 20, 35, 0.98); padding: 0 30px; color: white; 
            backdrop-filter: blur(20px); border-top: 2px solid var(--accent-blue); 
            display: none; align-items: center; justify-content: space-between; box-sizing: border-box;
        }
        .visualizer { display: flex; align-items: flex-end; gap: 5px; height: 40px; width: 60px; }
        .visualizer .bar { 
            width: 6px; background: var(--accent-blue); border-radius: 3px; height: 15%; 
            transition: height 0.1s ease; box-shadow: 0 0 10px var(--accent-blue);
        }
        .music-info { text-align: center; flex: 1; }
        .music-ctrl { background: none; border: none; color: white; font-size: 1.6rem; cursor: pointer; padding: 0 15px; transition: 0.2s; }
        .music-ctrl:hover { color: var(--accent-blue); transform: scale(1.1); }

        /* --- 彈窗 --- */
        #member-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-content { background: white; width: 85%; max-width: 400px; border-radius: 30px; padding: 40px; text-align: center; position: relative; animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 28px; color: #ccc; cursor: pointer; }
        .modal-avatar { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px; overflow: hidden; border: 3px solid var(--accent-blue); }
        .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="night-sky" id="star-container">
    </div>

<div id="login-overlay">
    <div class="login-box">
        <div class="typewriter-text">歡迎來到 322</div>
        <input type="password" id="pass-input" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter') checkPass()">
        <br><button class="btn-ig" style="padding: 12px 30px; font-size: 1rem;" onclick="checkPass()">確認身分</button>
    </div>
</div>

<div id="member-modal" onclick="if(event.target.id==='member-modal') closeModal()">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">×</span>
        <div class="modal-avatar"><img id="modal-img" src=""></div>
        <h2 id="modal-name" style="margin: 0; color: #1a2c42;"></h2>
        <span id="modal-tag" class="nickname-tag"></span>
        <div id="modal-quote" style="font-style: italic; color: #555; margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 12px;"></div>
    </div>
</div>

<div class="cursor-dot" id="dot1"></div>

<header>
    <h1> 322 憨包們 </h1>
    <div id="quote-display">「 加載中... 」</div>
</header>

<div class="container" id="members-container"></div>

<div class="module-container">
    <h3 style="color:var(--header-color); margin-top:0;">🎓 115 會考倒數</h3>
    <div id="timer" class="timer-grid">
        <div class="time-block"><span id="days">00</span><p>天</p></div>
        <div class="time-block"><span id="hours">00</span><p>時</p></div>
        <div class="time-block"><span id="minutes">00</span><p>分</p></div>
        <div class="time-block"><span id="seconds">00</span><p>秒</p></div>
    </div>
</div>

<div class="module-container">
    <h3 style="color:var(--header-color); margin-top:0;">💭 憨包留言板</h3>
    <div id="message-list"></div>
    <div style="display: flex; gap: 8px;">
        <input type="text" id="user-name" placeholder="名字" style="width: 70px; padding: 10px; border-radius: 10px; border: 1px solid #ddd;">
        <input type="text" id="user-msg" placeholder="想說什麼..." style="flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd;">
        <button onclick="postMessage()" style="padding: 10px 20px; background: var(--header-color); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">發送</button>
    </div>
</div>

<div id="music-player">
    <div class="visualizer" id="viz-left">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="music-info">
        <span id="current-track-name" style="font-size: 0.8rem; display: block; margin-bottom: 5px; opacity: 0.8;">🎵 準備播放</span>
        <div style="display: flex; align-items: center; justify-content: center;">
            <button class="music-ctrl" onclick="prevSong()">⏮</button>
            <button id="play-btn" class="music-ctrl" style="font-size: 2rem;" onclick="toggleMusic()">▶️</button>
            <button class="music-ctrl" onclick="nextSong()">⏭</button>
        </div>
    </div>
    <div class="visualizer" id="viz-right">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
</div>

<script>
    // --- Firebase 配置 ---
    const firebaseConfig = {
      apiKey: "AIzaSyAH3XXkYfepg-EfQkFAelq8f7d2Yk9JA74",
      authDomain: "project-1673660731296559126.firebaseapp.com",
      projectId: "project-1673660731296559126",
      databaseURL: "https://project-1673660731296559126-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ganHuaQuotes = ["雖然我們是憨包，但我們是全校最帥的憨包。", "只要我不尷尬，尷尬的就是飲水機。", "322 的情義，就像福利社的泡麵——又香又燙。", "今天不讀書，明天變大豬。", "老師在講我在聽，但我聽的是心碎的聲音。", "車子的擋風玻璃比後視鏡大，前方才是路。", "再忙再累，也要抽出時間讓自己帥起來。", "他人對你的尊重，從來不是因為你的順從。", "萬事萬物皆有裂痕，光就是這樣照進來的。", "先愛自己，因為自己是你餘生的伴侶。", "窮則思變，差則思勤！沒有比人更高的山！"];
    
    const members = [
        { id: "m1", name: "黃崇瑋", tag: "走步哥", ig: "bennynyhuang", img: "p1.jpg", quote: "相聚有時，後會無期" },
        { id: "m2", name: "林軒漢", tag: "妮塔", ig: "linxuanhan97", img: "p2.jpg", quote: "其實上課睡覺玩手機也能考 100" },
        { id: "m3", name: "徐堃翔", tag: "高工候選人", ig: "sean.hsu0930", img: "p3.jpg", quote: "清明時節雨坤坤 路上行人梳中分" },
        { id: "m4", name: "廖廷恩", tag: "大🍼野豬", ig: "ed_331ie", img: "p4.jpg", quote: "我沒有 就跟你說不是我" },
        { id: "m5", name: "蔡承烜", tag: "雨傘哥", ig: "pywb30", img: "p5.jpg", quote: "我家在大肚。" },
        { id: "m6", name: "簡宗翰", tag: "養身籃球", ig: "jzh.10.1015", img: "p6.jpg", quote: "徐堃翔真的是智障。" },
        { id: "m7", name: "鄭子恩", tag: "導演", ig: "hu.hu7557", img: "p7.jpg", quote: "ผัดกะเพราหมูไม่เผ็ด 打拋豬不要辣" },
        { id: "m8", name: "陳緯哲", tag: "崇瑋軒漢之父", ig: "a0981848508", img: "p8.jpg", quote: "崇瑋軒漢還不快點叫爸爸。" },
        { id: "m9", name: "趙峻霆", tag: "鬍子哥", ig: "venus_tt314", img: "p9.jpg", quote: "我愛染頭髮 跟雞窩一樣" }
    ];

    // --- 音樂頻譜控制 ---
    let audioCtx, analyser, source, dataArray, animId;
    const playlist = Array.from({length: 12}, (_, i) => `music${i+1}.mp3`);
    let trackIdx = 0;
    const audio = new Audio();
    audio.src = playlist[trackIdx];
    audio.crossOrigin = "anonymous";

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 64; 
        dataArray = new Uint8Array(analyser.frequencyBinCount);
    }

    function drawSpectrum() {
        animId = requestAnimationFrame(drawSpectrum);
        analyser.getByteFrequencyData(dataArray);
        const leftBars = document.querySelectorAll('#viz-left .bar');
        const rightBars = document.querySelectorAll('#viz-right .bar');
        const indices = [2, 6, 12, 20]; // 挑選具代表性的頻段
        indices.forEach((idx, i) => {
            const h = (dataArray[idx] / 255) * 100;
            const finalH = Math.max(15, h);
            if(leftBars[i]) leftBars[i].style.height = `${finalH}%`;
            if(rightBars[i]) rightBars[i].style.height = `${finalH}%`;
        });
    }

    function toggleMusic() {
        initAudio();
        const btn = document.getElementById('play-btn');
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (audio.paused) {
            audio.play();
            btn.innerText = "⏸";
            drawSpectrum();
        } else {
            audio.pause();
            btn.innerText = "▶️";
            cancelAnimationFrame(animId);
        }
    }

    function changeSong(offset) {
        trackIdx = (trackIdx + offset + playlist.length) % playlist.length;
        audio.src = playlist[trackIdx];
        document.getElementById('current-track-name').innerText = `🎵 曲目 ${trackIdx + 1}`;
        if (!audio.paused || audioCtx) {
            audio.play();
            document.getElementById('play-btn').innerText = "⏸";
            if(!animId) drawSpectrum();
        }
    }
    function nextSong() { changeSong(1); }
    function prevSong() { changeSong(-1); }
    audio.onended = nextSong;

    // --- 核心邏輯 ---
    function checkPass() {
        const input = document.getElementById('pass-input');
        if (input.value === "best322") { 
            document.getElementById('login-overlay').style.transform = "translateY(-100%)";
            document.getElementById('music-player').style.display = 'flex';
            startQuotes();
        } else { 
            alert("密碼不對喔，你真的是 322 的嗎？"); 
            input.value = ""; 
        }
    }

    function startQuotes() {
        const d = document.getElementById('quote-display');
        let i = 0;
        setInterval(() => {
            d.style.opacity = 0;
            setTimeout(() => {
                d.innerText = `「 ${ganHuaQuotes[i]} 」`;
                d.style.opacity = 1;
                i = (i + 1) % ganHuaQuotes.length;
            }, 800);
        }, 4000);
    }

    function renderCards() {
        const container = document.getElementById('members-container');
        members.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="photo-container" onclick='openModal(${JSON.stringify(m)})'><img src="${m.img}" loading="lazy"></div>
                <div class="info">
                    <div class="name" onclick='openModal(${JSON.stringify(m)})'>${m.name}</div>
                    <span class="nickname-tag">${m.tag}</span>
                    <div class="actions">
                        <a href="https://www.instagram.com/${m.ig}" class="btn-ig" target="_blank">IG</a>
                        <div class="like-box" id="btn-like-${m.id}" onclick="addLike('${m.id}')">❤️ <span id="like-${m.id}">0</span></div>
                    </div>
                </div>`;
            container.appendChild(card);
            observer.observe(card);
            db.ref('likes/'+m.id).on('value', s => { 
                document.getElementById(`like-${m.id}`).innerText = s.val() || 0; 
            });
        });
    }

    function addLike(id) {
        const btn = document.getElementById(`btn-like-${id}`);
        btn.classList.add('heart-pop');
        setTimeout(() => btn.classList.remove('heart-pop'), 400);
        db.ref('likes/'+id).transaction(c => (c || 0) + 1);
    }

    function openModal(m) {
        document.getElementById('modal-img').src = m.img;
        document.getElementById('modal-name').innerText = m.name;
        document.getElementById('modal-tag').innerText = m.tag;
        document.getElementById('modal-quote').innerText = m.quote;
        document.getElementById('member-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('member-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function postMessage() {
        const n = document.getElementById('user-name'), m = document.getElementById('user-msg');
        if (!m.value.trim()) return;
        db.ref('messages').push({ name: n.value.trim() || "匿名憨包", content: m.value.trim(), ts: Date.now() });
        m.value = "";
    }

    db.ref('messages').limitToLast(15).on('value', snap => {
        const list = document.getElementById('message-list');
        list.innerHTML = "";
        const data = snap.val();
        if (data) {
            Object.values(data).reverse().forEach(msg => {
                list.innerHTML += `<div class="msg-item"><strong>${msg.name}</strong>: ${msg.content}</div>`;
            });
        }
    });

    function updateCountdown() {
        const target = new Date(2026, 4, 16, 8, 0).getTime();
        const diff = target - Date.now();
        if (diff > 0) {
            document.getElementById('days').innerText = String(Math.floor(diff / 86400000)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
        }
    }

    // --- 效能與滑鼠監聽 ---
    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('show');
        });
    }, { threshold: 0.1 });

    window.addEventListener('mousemove', e => {
        const dot = document.getElementById('dot1');
        dot.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    });

    window.onload = () => {
        renderCards();
        setInterval(updateCountdown, 1000);
        updateCountdown();
    };
</script>
</body>
</html>
