<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>322 憨包們</title>
    <style>
        :root {
            --header-color: #0288d1;
            --card-bg: white;
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        /* 1. 全域樣式與流動背景 */
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(-45deg, #e3f2fd, #bbdefb, #90caf9, #e1f5fe);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. 夢幻氣泡層 */
        .bubbles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            animation: floatUp 12s infinite ease-in;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* 氣泡隨機分佈 */
        .bubble:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-duration: 10s; }
        .bubble:nth-child(2) { width: 30px; height: 30px; left: 25%; animation-duration: 15s; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 50px; height: 50px; left: 40%; animation-duration: 13s; animation-delay: 4s; }
        .bubble:nth-child(4) { width: 20px; height: 20px; left: 55%; animation-duration: 18s; animation-delay: 1s; }
        .bubble:nth-child(5) { width: 60px; height: 60px; left: 70%; animation-duration: 12s; animation-delay: 3s; }
        .bubble:nth-child(6) { width: 40px; height: 40px; left: 85%; animation-duration: 16s; animation-delay: 5s; }
        .bubble:nth-child(7) { width: 25px; height: 25px; left: 5%; animation-duration: 14s; animation-delay: 7s; }
        .bubble:nth-child(8) { width: 55px; height: 55px; left: 92%; animation-duration: 11s; animation-delay: 2s; }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            50% { transform: translateY(-50vh) translateX(30px) scale(1.1); }
            100% { transform: translateY(-120vh) translateX(-20px) scale(1.2); opacity: 0; }
        }

        /* 3. 標題與佈局 */
        header { text-align: center; padding: 60px 0; }
        h1 { 
            color: var(--header-color); 
            margin: 0; 
            font-size: 3rem;
            text-shadow: 2px 2px 8px rgba(2, 136, 209, 0.2);
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px;
            padding-bottom: 150px;
        }

        /* 4. 卡片設計 */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            padding-bottom: 25px;
            position: relative;
            opacity: 0;
            transform: translateY(40px);
        }

        .card.show { opacity: 1; transform: translateY(0); }

        .card:hover { 
            transform: translateY(-15px) scale(1.02); 
            box-shadow: 0 25px 50px rgba(2, 136, 209, 0.25);
            z-index: 10;
        }

        /* 滑過閃光效果 */
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
            pointer-events: none;
        }
        .card:hover::after { left: 125%; }

        .photo-container {
            width: 100%; height: 300px; 
            overflow: hidden;
            background-color: #f8f9fa;
        }

        .photo-container img {
            width: 100%; height: 100%;
            object-fit: cover; 
            transition: all 0.6s ease;
            filter: grayscale(15%);
        }

        .card:hover .photo-container img {
            transform: scale(1.1) rotate(1deg);
            filter: grayscale(0%);
        }

        .info { padding: 20px; }
        .name { font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; color: #2c3e50; }
        .nickname-tag { 
            display: inline-block;
            color: #0288d1; background: #e1f5fe;
            padding: 5px 18px; border-radius: 12px;
            font-size: 0.9rem; margin-bottom: 22px; font-weight: 600;
        }

        .btn-ig {
            display: inline-block;
            background: var(--ig-gradient);
            color: white; padding: 12px 35px; border-radius: 50px;
            text-decoration: none; font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.2);
            transition: all 0.3s ease;
        }

        /* 5. 音樂播放器 */
        .music-player {
            position: fixed;
            bottom: 25px; right: 25px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 18px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            z-index: 9999;
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
        }
        audio { height: 32px; width: 220px; }

        /* 6. RWD 響應式 */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .music-player { width: calc(100% - 60px); left: 30px; bottom: 20px; }
            audio { width: 100%; }
        }
    </style>
</head>

<script>
    // 捲動偵測與卡片顯示動畫
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
            if (entry.isIntersecting) {
                setTimeout(() => {
                    entry.target.classList.add('show');
                }, (index % 4) * 150); 
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.card').forEach(card => observer.observe(card));
</script>
