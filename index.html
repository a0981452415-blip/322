<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>322 憨包精華版</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --header-color: #0288d1;
            --accent-blue: #4fc3f7;
            --card-bg: rgba(255, 255, 255, 0.85);
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --bg-gradient: linear-gradient(-45deg, #050b14, #101d2d, #1a2c42, #050b14); 
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0; padding: 20px; overflow-x: hidden;
            cursor: none; 
            padding-bottom: 120px;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 25 顆流星座標 (精準還原) --- */
        .night-sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; transition: transform 0.1s ease-out; }
        .shooting-star {
            position: absolute; height: 2px; background: linear-gradient(-45deg, #ffffff, rgba(0, 0, 255, 0));
            filter: drop-shadow(0 0 6px #ffffff); border-radius: 999px; opacity: 0;
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        }

        .shooting-star:nth-child(1) { top: 0%; left: 80%; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 10%; left: 40%; animation-delay: 1.2s; animation-duration: 3.5s; transform: scale(0.7); }
        .shooting-star:nth-child(3) { top: 20%; left: 95%; animation-delay: 2.5s; }
        .shooting-star:nth-child(4) { top: 5%; left: 20%; animation-delay: 4s; animation-duration: 4s; transform: scale(1.2); }
        .shooting-star:nth-child(5) { top: 30%; left: 70%; animation-delay: 0.5s; }
        .shooting-star:nth-child(6) { top: 40%; left: 50%; animation-delay: 3.2s; transform: scale(0.8); }
        .shooting-star:nth-child(7) { top: 15%; left: 100%; animation-delay: 1.8s; }
        .shooting-star:nth-child(8) { top: 50%; left: 30%; animation-delay: 5s; animation-duration: 2.8s; }
        .shooting-star:nth-child(9) { top: 5%; left: 60%; animation-delay: 2.2s; }
        .shooting-star:nth-child(10) { top: 25%; left: 85%; animation-delay: 6.5s; transform: scale(1.1); }
        .shooting-star:nth-child(11) { top: 12%; left: 45%; animation-delay: 0.7s; }
        .shooting-star:nth-child(12) { top: 35%; left: 92%; animation-delay: 3.8s; animation-duration: 4.2s; }
        .shooting-star:nth-child(13) { top: 2%; left: 75%; animation-delay: 1.5s; }
        .shooting-star:nth-child(14) { top: 45%; left: 15%; animation-delay: 4.5s; transform: scale(0.6); }
        .shooting-star:nth-child(15) { top: 18%; left: 55%; animation-delay: 2.1s; }
        .shooting-star:nth-child(16) { top: 28%; left: 88%; animation-delay: 5.5s; }
        .shooting-star:nth-child(17) { top: 8%; left: 35%; animation-delay: 0.3s; animation-duration: 3.1s; }
        .shooting-star:nth-child(18) { top: 32%; left: 65%; animation-delay: 2.9s; }
        .shooting-star:nth-child(19) { top: 22%; left: 98%; animation-delay: 7s; transform: scale(1.3); }
        .shooting-star:nth-child(20) { top: 48%; left: 42%; animation-delay: 1.1s; }
        .shooting-star:nth-child(21) { top: 6%; left: 12%; animation-delay: 4.2s; }
        .shooting-star:nth-child(22) { top: 14%; left: 78%; animation-delay: 6s; }
        .shooting-star:nth-child(23) { top: 38%; left: 25%; animation-delay: 0.9s; animation-duration: 3.8s; }
        .shooting-star:nth-child(24) { top: 5%; left: 95%; animation-delay: 3.4s; }
        .shooting-star:nth-child(25) { top: 20%; left: 50%; animation-delay: 5.2s; transform: scale(0.9); }

        @keyframes tail { 0% { width: 0; } 30% { width: 120px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0) translateY(0) rotateZ(-45deg); opacity: 1; } 100% { transform: translateX(-1000px) translateY(1000px) rotateZ(-45deg); opacity: 0; } }

        /* --- UI 基礎樣式 --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 60000; background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1); }
        .login-box { background: rgba(0, 0, 0, 0.8); padding: 50px; border-radius: 30px; text-align: center; border: 1px solid var(--accent-blue); backdrop-filter: blur(15px); color: white; }
        .typewriter-text { font-family: 'Courier New', monospace; overflow: hidden; border-right: .15em solid var(--accent-blue); white-space: nowrap; margin: 0 auto 20px; letter-spacing: .15em; width: 0; font-size: 1.8rem; font-weight: bold; animation: typing 2s steps(10, end) forwards, blink-caret .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--accent-blue) } }
        .login-box input { background: rgba(255,255,255,0.1); color: white; padding: 12px; width: 220px; border-radius: 12px; border: 1px solid var(--accent-blue); margin: 20px 0; font-size: 1.1rem; text-align: center; outline: none; }

        .cursor-dot { width: 10px; height: 10px; background: radial-gradient(circle, var(--accent-blue) 0%, var(--header-color) 100%); position: fixed; top: 0; left: 0; border-radius: 50%; pointer-events: none; z-index: 100001; box-shadow: 0 0 12px var(--accent-blue); }
        @media (max-width: 768px) { .cursor-dot { display: none; } body { cursor: auto; } }

        /* --- 3D 翻轉卡片系統 --- */
        .container { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding-bottom: 60px; }
        .card-perspective { perspective: 1000px; height: 480px; opacity: 0; transform: translateY(40px); transition: all 0.6s ease-out; }
        .card-perspective.show { opacity: 1; transform: translateY(0); }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: none; }
        .card-perspective.flipped .card-inner { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; overflow: hidden; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .card-back { transform: rotateY(180deg); background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box; text-align: center; }

        .photo-container { width: 100%; height: 320px; background: #eee; overflow: hidden; position: relative; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 1.6rem; font-weight: 800; margin-top: 15px; color: #1a2c42; }
        .nickname-tag { display: inline-block; color: #fff; background: var(--header-color); padding: 5px 15px; border-radius: 10px; margin: 10px 0; font-weight: 600; }
        
        /* --- 模組樣式 --- */
        .module-container { position: relative; z-index: 10; max-width: 700px; margin: 0 auto 30px; background: var(--card-bg); padding: 25px; border-radius: 25px; border: 2px solid var(--accent-blue); backdrop-filter: blur(10px); text-align: center; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .time-block span { display: block; font-size: 2rem; font-weight: 800; color: var(--header-color); }
        #random-quote-box { margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.6); border-radius: 15px; min-height: 60px; display: flex; align-items: center; justify-content: center; color: #01579b; font-weight: bold; border: 1px dashed var(--accent-blue); transition: opacity 0.3s; }

        /* --- 播放器 --- */
        #music-player { position: fixed; bottom: 0; left: 0; width: 100%; height: 85px; z-index: 9999; background: rgba(10, 20, 35, 0.95); padding: 0 20px; color: white; backdrop-filter: blur(15px); border-top: 2px solid var(--accent-blue); display: none; align-items: center; justify-content: space-between; box-sizing: border-box; }
        .visualizer { display: flex; align-items: flex-end; gap: 4px; height: 35px; }
        .visualizer .bar { width: 5px; background: var(--accent-blue); border-radius: 3px; height: 15%; transition: height 0.08s; box-shadow: 0 0 10px var(--accent-blue); }

        .heart-particle { position: fixed; pointer-events: none; animation: heartFloat 1s ease-out forwards; z-index: 100002; font-size: 24px; }
        @keyframes heartFloat { 0% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(2) translateY(-120px) rotate(25deg); opacity: 0; } }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

        <button onclick="prevSong()" style="background:none; border:none; color:white; font-size:1.2rem; cursor:none;">⏮</button>
        <button id="play-btn" onclick="toggleMusic()" style="background:none; border:none; color:white; font-size:1.8rem; margin:0 15px; cursor:none;">▶️</button>

<script>
    // --- Firebase 配置 ---
    const firebaseConfig = {
      apiKey: "AIzaSyAH3XXkYfepg-EfQkFAelq8f7d2Yk9JA74",
      authDomain: "project-1673660731296559126.firebaseapp.com",
      projectId: "project-1673660731296559126",
      databaseURL: "https://project-1673660731296559126-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 完整幹話庫 (13句全回歸) ---
    const ganHuaQuotes = [ 
        "車子的擋風玻璃比後視鏡大，人生前方的路也比過去的經歷更重要。", 
        "再忙再累，也要抽出時間讓自己美起來。",

        "青春不是雪，不是躲到陽光照不到的地方，就可以熬過不屬於自己的季節。", 
        "人生的道路上，你沒有耐心去等待成功，那麼你只有用一生去面對失敗。", 
        "每個人的一生都有許多夢想，剩下的就僅僅是行動了。", 
        "從現在開始，不沉溺幻想，好好生活，做一個接近幸福的人。", 
        "萬事萬物皆有裂痕，光就是這樣照進來的。", 
        "生活是屬於每個人自己的感受，不屬於別人的看法。", 
        "先愛自己，因為自己是你餘生的伴侶。", 
        "不要為小事遮住視線，我們還有更大的世界。", 
        "窮則思變，差則思勤!沒有比人更高的山！" 
    ];
    
    const members = [
        { id: "m1", name: "黃崇瑋", tag: "走步哥", ig: "bennynyhuang", img: "p1.jpg", quote: "相聚有時，後會無期" },
        { id: "m2", name: "林軒漢", tag: "妮塔", ig: "linxuanhan97", img: "p2.jpg", quote: "「其實上課睡覺玩手機也能考100」" },
        { id: "m3", name: "徐堃翔", tag: "高工候選人", ig: "sean.hsu0930", img: "p3.jpg", quote: "「清明時節雨坤坤 路上行人梳中分」" },
        { id: "m4", name: "廖廷恩", tag: "大🍼野豬", ig: "ed_331ie", img: "p4.jpg", quote: "「我沒有 就跟你說不是我」" },
        { id: "m5", name: "蔡承烜", tag: "雨傘哥", ig: "pywb30", img: "p5.jpg", quote: "「我家在大肚。」" },
        { id: "m6", name: "簡宗翰", tag: "養身籃球", ig: "jzh.10.1015", img: "p6.jpg", quote: "「徐堃翔真的是智障。」" },
        { id: "m7", name: "鄭子恩", tag: "導演", ig: "hu.hu7557", img: "p7.jpg", quote: "「打拋豬不要辣」" },
        { id: "m8", name: "陳緯哲", tag: "崇瑋 軒漢父親", ig: "a0981848508", img: "p8.jpg", quote: "「養兒方知父母恩，崇瑋軒漢叫爸爸。」" },
        { id: "m9", name: "趙峻霆", tag: "鬍子哥", ig: "venus_tt314", img: "p9.jpg", quote: "「我愛染頭髮 跟雞窩一樣」" }
    ];

    // --- 核心功能 ---
    const observer = new IntersectionObserver(es => es.forEach(e => e.isIntersecting && e.target.classList.add('show')), {threshold: 0.1});

    function renderCards() {
        const container = document.getElementById('members-container');
        members.forEach(m => {
            const wrap = document.createElement('div');
            wrap.className = 'card-perspective';
            wrap.innerHTML = `
                <div class="card-inner" onclick="toggleFlip(this)">
                    <div class="card-face">
                        <div class="photo-container"><img src="${m.img}" onpointerdown="startHeart(event)" onpointerup="stopHeart()" onpointerleave="stopHeart()"></div>
                        <div style="padding:15px;">
                            <div class="name">${m.name}</div>
                            <span class="nickname-tag">${m.tag}</span>
                            <div style="margin-top:10px; color:#e91e63; font-weight:800; display:flex; align-items:center; justify-content:center; gap:5px;" onclick="event.stopPropagation(); addLike('${m.id}')">❤️ <span id="like-${m.id}">0</span></div>
                        </div>
                    </div>
                    <div class="card-face card-back">
                        <h2 style="color:#1a2c42; margin-bottom:10px;">${m.name}</h2>
                        <div style="background:#f8f9fa; padding:15px; border-radius:15px; font-style:italic; color:#555;">${m.quote}</div>
                        <a href="https://www.instagram.com/${m.ig}" target="_blank" class="nickname-tag" style="text-decoration:none; background:var(--ig-gradient); margin-top:20px; cursor:none;">追蹤 IG</a>
                        <p style="font-size:0.8rem; color:#bbb; margin-top:15px;">點擊翻回正面</p>
                    </div>
                </div>`;
            container.appendChild(wrap);
            observer.observe(wrap);
            db.ref('likes/'+m.id).on('value', s => { document.getElementById(`like-${m.id}`).innerText = s.val() || 0; });
        });
    }

    function toggleFlip(el) { el.parentElement.classList.toggle('flipped'); }

    // 愛心噴發
    let hT;
    function startHeart(e) {
        hT = setInterval(() => {
            const h = document.createElement('div');
            h.className = 'heart-particle'; h.innerHTML = '❤️';
            h.style.left = (e.clientX || (e.touches && e.touches[0].clientX)) + 'px';
            h.style.top = (e.clientY || (e.touches && e.touches[0].clientY)) + 'px';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1000);
        }, 100);
    }
    function stopHeart() { clearInterval(hT); }

    // 隨機幹話抽卡
    function drawRandomQuote() {
        const box = document.getElementById('random-quote-box');
        box.style.opacity = 0;
        setTimeout(() => {
            box.innerText = ganHuaQuotes[Math.floor(Math.random() * ganHuaQuotes.length)];
            box.style.opacity = 1;
        }, 300);
    }

    // 陀螺儀連動
    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (e) => {
            const sky = document.getElementById('nightSky');
            sky.style.transform = `translate(${e.gamma/6}px, ${e.beta/6}px)`;
        });
    }

    // 音樂與頻譜
    let aCtx, analyser, dataArr, animId;
    const playlist = Array.from({length: 12}, (_, i) => `music${i+1}.mp3`);
    let cIdx = 0;
    const audio = new Audio(playlist[cIdx]);
    audio.crossOrigin = "anonymous";

    function toggleMusic() {
        if (!aCtx) {
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = aCtx.createAnalyser();
            const source = aCtx.createMediaElementSource(audio);
            source.connect(analyser); analyser.connect(aCtx.destination);
            analyser.fftSize = 64; dataArr = new Uint8Array(analyser.frequencyBinCount);
        }
        if (audio.paused) { audio.play(); document.getElementById('play-btn').innerText = "⏸"; drawSpectrum(); } 
        else { audio.pause(); document.getElementById('play-btn').innerText = "▶️"; }
    }

    function drawSpectrum() {
        animId = requestAnimationFrame(drawSpectrum);
        analyser.getByteFrequencyData(dataArr);
        const bars = document.querySelectorAll('.bar');
        [2, 6, 12, 20].forEach((idx, i) => {
            const h = (dataArr[idx] / 255) * 100;
            bars[i].style.height = bars[i+4].style.height = `${Math.max(15, h)}%`;
        });
    }

    function playNew() { audio.src = playlist[cIdx]; audio.play(); document.getElementById('current-track-name').innerText = `🎵 曲目 ${cIdx+1}`; }
    function nextSong() { cIdx = (cIdx + 1) % playlist.length; playNew(); }
    function prevSong() { cIdx = (cIdx - 1 + playlist.length) % playlist.length; playNew(); }
    audio.onended = nextSong;

    // 滑鼠點
    const dots = document.querySelectorAll('.cursor-dot');
    window.addEventListener('mousemove', e => {
        dots.forEach((dot, i) => {
            setTimeout(() => { dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px'; }, i * 50);
        });
    });

    // 登入
    function checkPass() {
        if (document.getElementById('pass-input').value === "best322") {
            document.getElementById('login-overlay').style.transform = "translateY(-100%)";
            document.getElementById('music-player').style.display = 'flex';
            rotateQuotes();
        } else { alert("抱歉你不是322憨包:?"); }
    }

    function rotateQuotes() {
        const d = document.getElementById('quote-display'); let i = 0;
        setInterval(() => {
            d.style.opacity = 0;
            setTimeout(() => { d.innerText = `「 ${ganHuaQuotes[i]} 」`; d.style.opacity = 1; i = (i + 1) % ganHuaQuotes.length; }, 800);
        }, 4500);
    }

    function postMessage() {
        const n = document.getElementById('user-name'), m = document.getElementById('user-msg');
        if (!m.value.trim()) return;
        db.ref('messages').push({ name: n.value || "匿名", content: m.value, ts: Date.now() });
        m.value = "";
    }

    db.ref('messages').limitToLast(10).on('value', s => {
        const list = document.getElementById('message-list'); list.innerHTML = "";
        const data = s.val();
        if (data) Object.values(data).reverse().forEach(v => {
            list.innerHTML += `<div style="background:white; padding:10px; border-radius:10px; margin-bottom:8px; box-shadow:0 2px 5px rgba(0,0,0,0.05);"><b>${v.name}:</b> ${v.content}</div>`;
        });
    });

    function updateCountdown() {
        const diff = new Date(2026, 4, 16, 8, 0) - Date.now();
        if (diff > 0) {
            document.getElementById('days').innerText = String(Math.floor(diff / 86400000)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
        }
    }

    function addLike(id) { db.ref('likes/'+id).transaction(c => (c || 0) + 1); }

    window.onload = () => { renderCards(); updateCountdown(); setInterval(updateCountdown, 1000); };
</script>
</body>
</html>
