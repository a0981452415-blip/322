        .shooting-star:nth-child(13) { top: 2%; left: 75%; animation-delay: 1.5s; }
        .shooting-star:nth-child(14) { top: 45%; left: 15%; animation-delay: 4.5s; transform: scale(0.6); }
        .shooting-star:nth-child(15) { top: 18%; left: 55%; animation-delay: 2.1s; }
        .shooting-star:nth-child(16) { top: 28%; left: 88%; animation-delay: 5.5s; }
        .shooting-star:nth-child(17) { top: 8%; left: 35%; animation-delay: 0.3s; animation-duration: 3.1s; }
        .shooting-star:nth-child(18) { top: 32%; left: 65%; animation-delay: 2.9s; }
        .shooting-star:nth-child(19) { top: 22%; left: 98%; animation-delay: 7s; transform: scale(1.3); }

        @keyframes tail { 0% { width: 0; } 30% { width: 120px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0) translateY(0) rotateZ(-45deg); opacity: 1; } 100% { transform: translateX(-1000px) translateY(1000px) rotateZ(-45deg); opacity: 0; } }

        /* --- 登入介面 --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 60000; background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1); }

        .typewriter-text { font-family: 'Courier New', Courier, monospace; overflow: hidden; border-right: .15em solid var(--accent-blue); white-space: nowrap; margin: 0 auto 20px; letter-spacing: .15em; width: 0; font-size: 1.8rem; font-weight: bold; animation: typing 2s steps(10, end) forwards, blink-caret .75s step-end infinite; }

        /* --- 滑鼠特效 --- */

        }

        .modal-quote-text { font-style: italic; color: #555; line-height: 1.6; margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 15px; position: relative; }

        /* --- 模組容器 --- */
        .module-container { position: relative; z-index: 10; max-width: 700px; margin: 0 auto 30px; background: var(--card-bg); padding: 25px; border-radius: 25px; border: 2px solid var(--accent-blue); backdrop-filter: blur(10px); text-align: center; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .time-block { background: rgba(2, 136, 209, 0.1); padding: 10px; border-radius: 12px; }
        .time-block span { display: block; font-size: 2rem; font-weight: 800; color: var(--header-color); }
        
        #random-quote-box { margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.6); border-radius: 15px; min-height: 60px; display: flex; align-items: center; justify-content: center; color: #01579b; font-weight: bold; border: 1px dashed var(--accent-blue); transition: opacity 0.3s; }

        #message-list { max-height: 250px; overflow-y: auto; margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 15px; }
        .msg-item { background: white; padding: 10px 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); animation: fadeIn 0.5s ease; text-align: left; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 播放器 --- */
        #music-player { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; z-index: 9999; 
            background: rgba(10, 20, 35, 0.95); padding: 0 40px; color: white; 
            backdrop-filter: blur(15px); border-top: 2px solid var(--accent-blue); 
            display: none; align-items: center; justify-content: space-between; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); box-sizing: border-box;
        }
        .visualizer { display: flex; align-items: flex-end; gap: 3px; height: 25px; width: 40px; }
        .visualizer .bar { width: 4px; background: var(--accent-blue); border-radius: 2px; height: 20%; transition: 0.2s; }
        .playing .bar { animation: bar-bounce 0.6s ease-in-out infinite alternate; }
        @keyframes bar-bounce { from { height: 20%; } to { height: 100%; } }
        .music-ctrl { background: none; border: none; color: white; font-size: 1.5rem; cursor: none; padding: 0 10px; }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        a, button, input, .like-box, .music-ctrl, .close-btn { cursor: none !important; }
    </style>
</head>

<script>

    const ganHuaQuotes = ["雖然我們是憨包，但我們是全校最帥的憨包。", "只要我不尷尬，尷尬的就是飲水機。", "322 的情義，就像福利社的泡麵——又香又燙。", "今天不讀書，明天變大豬。", "老師在講我在聽，但我聽的是心碎的聲音。", "車子的擋風玻璃比後視鏡大，人生前方的路也比過去的經歷更重要。", "再忙再累，也要抽出時間讓自己美起來。", "沮喪太容易了，頂著一切苦，依舊熱愛生活才是真的酷!", "他人對你的尊重，從來不是因為你的順從。", "青春不是雪，不是躲到陽光照不到的地方，就可以熬過不屬於自己的季節。", "人生的道路上，你沒有耐心去等待成功，那麼你只有用一生去面對失敗。", "每個人的一生都有許多夢想，剩下的就僅僅是行動了。", "從現在開始，不沉溺幻想，好好生活，做一個接近幸福的人。", "萬事萬物皆有裂痕，光就是這樣照進來的。", "生活是屬於每個人自己的感受，不屬於別人的看法。", "先愛自己，因為自己是你餘生的伴侶。", "不要為小事遮住視線，我們還有更大的世界。", "窮則思變，差則思勤!沒有比人更高的山！", "（某某某）又在走步了，裁判沒看到嗎？"];
    
    // 補齊了專屬語錄欄位
    const members = [
        { id: "m1", name: "黃崇瑋", tag: "走步哥", ig: "bennynyhuang", img: "p1.jpg", quote: "相聚有時，後會無期" },
        { id: "m2", name: "林軒漢", tag: "妮塔", ig: "linxuanhan97", img: "p2.jpg", quote: "「其實上課睡覺玩手機也能考100」" },
        { id: "m3", name: "徐堃翔", tag: "高工候選人", ig: "sean.hsu0930", img: "p3.jpg", quote: "「清明時節雨坤坤 路上行人梳中分」" },

        { id: "m5", name: "蔡承烜", tag: "雨傘哥", ig: "pywb30", img: "p5.jpg", quote: "「我家在大肚。」" },
        { id: "m6", name: "簡宗翰", tag: "養身籃球", ig: "jzh.10.1015", img: "p6.jpg", quote: "「徐堃翔真的是智障。」" },
        { id: "m7", name: "鄭子恩", tag: "導演", ig: "hu.hu7557", img: "p7.jpg", quote: "「ผัดกะเพราหมูไม่เผ็ด 打拋豬不要辣」" },
        { id: "m8", name: "陳緯哲", tag: "崇瑋 軒漢父親", ig: "a0981848508", img: "p8.jpg", quote: "「養兒方知父母恩，崇瑋軒漢還不快點叫爸爸。」" },
        { id: "m9", name: "趙峻霆", tag: "鬍子哥", ig: "venus_tt314", img: "p9.jpg", quote: "「我愛染頭髮 跟雞窩一樣」" }
    ];

    // --- 彈窗邏輯 ---
    function openModal(member) {
        document.getElementById('modal-img').src = member.img;
        document.getElementById('modal-name').innerText = member.name;
        document.getElementById('modal-tag').innerText = member.tag;
        document.getElementById('modal-quote').innerText = member.quote;
        document.getElementById('member-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // 禁止滾動
    }

    function closeModal() {
        document.getElementById('member-modal').style.display = 'none';
        document.body.style.overflow = 'auto'; // 恢復滾動
    }

    function closeModalByBg(e) {
        if(e.target.id === 'member-modal') closeModal();
    }

    // --- 音樂功能 ---
    const playlist = Array.from({length: 12}, (_, i) => `music${i+1}.mp3`);
    let currentTrackIndex = 0;
    const audio = new Audio();
    audio.src = playlist[currentTrackIndex];

    function updateTrackUI() { document.getElementById('current-track-name').innerText = `🎵 曲目 ${currentTrackIndex + 1}`; }
    function updateVisualizer(isPlaying) {
        const vLeft = document.getElementById('viz-left'), vRight = document.getElementById('viz-right');
        if (isPlaying) { vLeft.classList.add('playing'); vRight.classList.add('playing'); }
        else { vLeft.classList.remove('playing'); vRight.classList.remove('playing'); }
    }
    function toggleMusic() {
        const btn = document.getElementById('play-btn');
        if (audio.paused) { audio.play(); btn.innerText = "⏸"; updateVisualizer(true); }
        else { audio.pause(); btn.innerText = "▶️"; updateVisualizer(false); }
    }
    function nextSong() {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        audio.src = playlist[currentTrackIndex]; audio.play();
        document.getElementById('play-btn').innerText = "⏸"; updateTrackUI(); updateVisualizer(true);
    }
    function prevSong() {
        currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
        audio.src = playlist[currentTrackIndex]; audio.play();
        document.getElementById('play-btn').innerText = "⏸"; updateTrackUI(); updateVisualizer(true);
    }
    audio.onended = nextSong;

    // --- 語錄與留言 ---
    function drawRandomQuote() {
        const box = document.getElementById('random-quote-box');
        box.style.opacity = 0;
        setTimeout(() => {
            box.innerText = ganHuaQuotes[Math.floor(Math.random() * ganHuaQuotes.length)];
            box.style.opacity = 1;
        }, 300);
    }

    function postMessage() {
        const nInput = document.getElementById('user-name'), mInput = document.getElementById('user-msg');
        if (!mInput.value.trim()) return;
        db.ref('messages').push({ name: nInput.value.trim() || "匿名憨包", content: mInput.value.trim(), ts: Date.now() });
        mInput.value = "";
    }

    db.ref('messages').limitToLast(10).on('value', snap => {
        const list = document.getElementById('message-list'); list.innerHTML = "";
        const data = snap.val();
        if (data) {
            Object.values(data).reverse().forEach(m => {
                list.innerHTML += `<div class="msg-item"><strong>${m.name}</strong>: ${m.content}</div>`;
            });
        }
    });

    function checkPass() {
        const input = document.getElementById('pass-input');
        if (input.value === "best322") { 
            document.getElementById('login-overlay').style.transform = "translateY(-100%)";
            document.getElementById('music-player').style.display = 'flex';
            rotateQuotes(); updateTrackUI();
        } else { alert("抱歉你不是322憨包:?"); input.value = ""; }
    }

    function rotateQuotes() {
        const d = document.getElementById('quote-display'); let i = 0;
        setInterval(() => {
            d.style.opacity = 0;
            setTimeout(() => { d.innerText = `「 ${ganHuaQuotes[i]} 」`; d.style.opacity = 1; i = (i + 1) % ganHuaQuotes.length; }, 800);
        }, 4500);
    }

    function renderCards() {
        const container = document.getElementById('members-container');
        members.forEach(m => {
            const card = document.createElement('div'); card.className = 'card';
            // 將原本的 HTML 結構包裹，並新增 onclick 觸發彈窗
            card.innerHTML = `
                <div class="photo-container" onclick='openModal(${JSON.stringify(m)})'><img src="${m.img}"></div>
                <div class="info">
                    <div class="name" onclick='openModal(${JSON.stringify(m)})'>${m.name}</div>
                    <span class="nickname-tag">${m.tag}</span>
                    <div class="actions">
                        <a href="https://www.instagram.com/${m.ig}" class="btn-ig" target="_blank">IG</a>
                        <div class="like-box" onclick="addLike('${m.id}')">❤️ <span id="like-${m.id}">0</span></div>
                    </div>
                </div>`;
            container.appendChild(card); observer.observe(card);
            db.ref('likes/'+m.id).on('value', s => { document.getElementById(`like-${m.id}`).innerText = s.val() || 0; });
        });
    }

    function addLike(id) { db.ref('likes/'+id).transaction(c => (c || 0) + 1); }

    function updateCountdown() {
        const end = new Date(2026, 4, 16, 8, 0).getTime();
        const diff = end - Date.now();
        if (diff > 0) {
            document.getElementById('days').innerText = String(Math.floor(diff / 86400000)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
        }
    }

    const observer = new IntersectionObserver(es => es.forEach(e => e.isIntersecting && e.target.classList.add('show')));
    const dots = document.querySelectorAll('.cursor-dot');
    window.addEventListener('mousemove', e => {
        dots.forEach((dot, i) => { setTimeout(() => { dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px'; }, i * 50); });
    });

    setInterval(updateCountdown, 1000);
    window.onload = () => { renderCards(); updateCountdown(); };
</script>
</body>
</html>
