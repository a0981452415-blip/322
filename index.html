<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>322憨包們</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --header-color: #0288d1;
            --accent-blue: #4fc3f7;
            --card-bg: rgba(255, 255, 255, 0.95);
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --bg-gradient: linear-gradient(-45deg, #e3f2fd, #bbdefb, #90caf9, #e1f5fe);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0; padding: 20px; overflow-x: hidden;
            cursor: none; 
        }

        a, button, .playlist-item, input { cursor: none; }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 30000; background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .login-box {
            background: rgba(255, 255, 255, 0.9); padding: 50px; border-radius: 30px;
            text-align: center; box-shadow: 0 15px 50px rgba(2, 136, 209, 0.2);
            border: 2px solid var(--header-color); backdrop-filter: blur(10px);
        }
        .login-box input {
            padding: 12px; width: 220px; border-radius: 12px;
            border: 1px solid #ddd; margin: 20px 0;
            font-size: 1.1rem; text-align: center; outline: none;
        }

        .cursor-dot {
            width: 10px; height: 10px;
            background: radial-gradient(circle, var(--accent-blue) 0%, var(--header-color) 100%);
            position: fixed; top: 0; left: 0; border-radius: 50%;
            pointer-events: none; z-index: 40000;
            box-shadow: 0 0 12px var(--accent-blue);
        }

        header { text-align: center; padding: 40px 0; }
        header h1 { color: var(--header-color); font-size: 3rem; letter-spacing: 4px; }
        
        .container {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px; padding-bottom: 60px;
        }
        
        .card {
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; padding-bottom: 25px; 
            opacity: 0; transform: translateY(40px); transition: 0.4s;
        }
        .card.show { opacity: 1; transform: translateY(0); }
        
        .photo-container { width: 100%; height: 300px; background: #eee; overflow: hidden; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 1.5rem; font-weight: 800; margin-top: 15px; color: #333; }
        .nickname-tag { display: inline-block; color: var(--header-color); background: #e1f5fe; padding: 5px 15px; border-radius: 10px; margin: 10px 0; font-weight: 600;}
        .btn-ig { display: inline-block; background: var(--ig-gradient); color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; }

        .msg-board {
            max-width: 700px; margin: 0 auto 50px;
            background: var(--card-bg); padding: 25px;
            border-radius: 25px; border: 2px solid var(--header-color);
        }
        .msg-input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .msg-input-area input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        .msg-list { max-height: 300px; overflow-y: auto; }
        .msg-item { background: #f0faff; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--header-color); text-align: left;}

        .countdown-container { max-width: 700px; margin: 0 auto 100px; background: var(--card-bg); padding: 20px; border-radius: 25px; text-align: center; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .time-block { background: #e1f5fe; padding: 10px; border-radius: 12px; }
        .time-block span { display: block; font-size: 1.8rem; font-weight: 800; color: var(--header-color); }
        
        .music-player { position: fixed; bottom: 20px; right: 20px; width: 240px; background: white; padding: 15px; border-radius: 20px; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:var(--header-color)">322 基地入口</h2>
        <input type="password" id="pass-input" placeholder="請輸入暗號...">
        <br><button class="btn-ig" onclick="checkPass()">進入基地</button>
    </div>
</div>

<div class="cursor-dot"></div><div class="cursor-dot"></div><div class="cursor-dot"></div><div class="cursor-dot"></div><div class="cursor-dot"></div>

<header><h1>322 憨包們</h1></header>

<div class="container">
    <div class="card"><div class="photo-container"><img src="p1.jpg"></div><div class="info"><div class="name">黃崇瑋</div><span class="nickname-tag">走步哥</span><br><a href="https://www.instagram.com/bennynyhuang" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p2.jpg"></div><div class="info"><div class="name">林軒漢</div><span class="nickname-tag">妮塔</span><br><a href="https://www.instagram.com/linxuanhan97" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p3.jpg"></div><div class="info"><div class="name">徐堃翔</div><span class="nickname-tag">高工候選人</span><br><a href="https://www.instagram.com/sean.hsu0930" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p4.jpg"></div><div class="info"><div class="name">廖廷恩</div><span class="nickname-tag">大🍼野豬</span><br><a href="https://www.instagram.com/ed_331ie" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p5.jpg"></div><div class="info"><div class="name">蔡承烜</div><span class="nickname-tag">雨傘哥</span><br><a href="https://www.instagram.com/pywb30" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p6.jpg"></div><div class="info"><div class="name">簡宗翰</div><span class="nickname-tag">養身籃球</span><br><a href="https://www.instagram.com/jzh.10.1015" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p7.jpg"></div><div class="info"><div class="name">鄭子恩</div><span class="nickname-tag">導演</span><br><a href="https://www.instagram.com/hu.hu7557" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p8.jpg"></div><div class="info"><div class="name">陳緯哲</div><span class="nickname-tag">崇瑋 軒漢父親</span><br><a href="https://www.instagram.com/a0981848508" class="btn-ig">Instagram</a></div></div>
</div>

<div class="msg-board">
    <h3 style="color:var(--header-color); text-align:center;">💬 322 匿名聊天室</h3>
    <div class="msg-input-area">
        <input type="text" id="msg-input" placeholder="說點什麼吧...">
        <button class="btn-ig" onclick="sendMsg()">發送</button>
    </div>
    <div id="msg-list" class="msg-list"></div>
</div>

<div class="countdown-container">
    <h3 style="color:var(--header-color)">🎓 115 會考倒數</h3>
    <div id="timer" class="timer-grid">
        <div class="time-block"><span id="days">00</span><p>天</p></div>
        <div class="time-block"><span id="hours">00</span><p>時</p></div>
        <div class="time-block"><span id="minutes">00</span><p>分</p></div>
        <div class="time-block"><span id="seconds">00</span><p>秒</p></div>
    </div>
</div>

<div class="music-player">
    <p id="song-title" style="font-size:0.8rem; margin:0 0 10px 0;">🎵 待播放...</p>
    <audio id="bg-audio"><source id="audio-source" src="music1.mp3"></audio>
    <button onclick="shuffleSong()" style="width:100%; border:none; background:#eee; padding:5px; border-radius:5px;">隨機播放</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAH3XXkYfepg-EfQkFAelq8f7d2Yk9JA74",
      authDomain: "project-1673660731296559126.firebaseapp.com",
      projectId: "project-1673660731296559126",
      storageBucket: "project-1673660731296559126.firebasestorage.app",
      messagingSenderId: "475041608650",
      appId: "1:475041608650:web:59e544b5f9a8dca98c1533",
      databaseURL: "https://project-1673660731296559126-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkPass() {
        if (document.getElementById('pass-input').value === "322") { 
            document.getElementById('login-overlay').style.transform = "translateY(-100%)";
            shuffleSong();
        }
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if (input.value.trim() === "") return;
        const now = new Date();
        db.ref('messages').push({
            text: input.value,
            time: `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`,
            timestamp: Date.now()
        });
        input.value = "";
    }

    db.ref('messages').limitToLast(20).on('value', (snapshot) => {
        const list = document.getElementById('msg-list');
        list.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            Object.values(data).reverse().forEach(msg => {
                const div = document.createElement('div');
                div.className = 'msg-item';
                div.innerHTML = `<strong>匿名憨包</strong> <small>${msg.time}</small><br>${msg.text}`;
                list.appendChild(div);
            });
        }
    });

    const dots = document.querySelectorAll('.cursor-dot');
    let mouseX = 0, mouseY = 0;
    window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    function moveDots() {
        let x = mouseX, y = mouseY;
        dots.forEach((dot, index) => {
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
            dot.style.opacity = 1 - (index * 0.2);
        });
        requestAnimationFrame(moveDots);
    }
    moveDots();

    function updateCountdown() {
        const end = new Date(2026, 4, 16, 8, 0, 0).getTime();
        const now = new Date().getTime();
        const diff = end - now;
        if (diff < 0) return;
        document.getElementById('days').innerText = Math.floor(diff / 86400000);
        document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
        document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000);
        document.getElementById('seconds').innerText = Math.floor((diff % 60000) / 1000);
    }
    setInterval(updateCountdown, 1000);

    const playlist = ["music1.mp3", "music2.mp3", "music3.mp3", "music4.mp3", "music5.mp3", "music6.mp3", "music7.mp3", "music8.mp3", "music9.mp3", "music10.mp3"];
    function shuffleSong() {
        const audio = document.getElementById('bg-audio');
        const song = playlist[Math.floor(Math.random() * playlist.length)];
        document.getElementById('audio-source').src = song;
        document.getElementById('song-title').innerText = "🎵 正在播放：" + song;
        audio.load();
        audio.play().catch(() => {});
    }

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('show'); });
    });
    window.onload = () => { document.querySelectorAll('.card').forEach(c => observer.observe(c)); updateCountdown(); };
</script>
</body>
</html>
