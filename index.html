<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>322憨包們</title>
    <style>
        :root {
            --header-color: #0288d1;
            --card-bg: white;
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        /* 1. 流動背景動畫 */
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(-45deg, #e3f2fd, #bbdefb, #90caf9, #e1f5fe);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header {
            text-align: center;
            padding: 60px 0;
        }

        h1 { 
            color: var(--header-color); 
            margin: 0; 
            font-size: 3rem;
            text-shadow: 2px 2px 8px rgba(2, 136, 209, 0.2);
            letter-spacing: 2px;
        }

        /* 2. 容器與卡片佈局 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px;
            padding-bottom: 150px;
        }

        /* 3. 卡片精緻特效 (含 2.0 隱形光澤) */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            padding-bottom: 25px;
            position: relative;
            /* 初始動畫狀態 */
            opacity: 0;
            transform: translateY(40px);
        }

        /* 當 JS 偵測到捲動時觸發 */
        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover { 
            transform: translateY(-15px) scale(1.02); 
            box-shadow: 0 25px 50px rgba(2, 136, 209, 0.25);
            z-index: 10;
        }

        /* 卡片光澤圖層 */
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 100%);
            transform: skewX(-25deg);
            transition: 0.75s;
            pointer-events: none;
        }

        .card:hover::after {
            left: 125%;
        }

        .photo-container {
            width: 100%;
            height: 300px; 
            overflow: hidden;
            background-color: #f8f9fa;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: transform 0.6s ease, filter 0.5s ease;
            filter: grayscale(15%);
        }

        .card:hover .photo-container img {
            transform: scale(1.1) rotate(1deg);
            filter: grayscale(0%);
        }

        .info { padding: 20px; }
        
        .name { 
            font-size: 1.6rem; 
            font-weight: 800; 
            margin-bottom: 10px; 
            color: #2c3e50; 
        }
        
        .nickname-tag { 
            display: inline-block;
            color: #0288d1; 
            background: #e1f5fe;
            padding: 5px 18px;
            border-radius: 12px;
            font-size: 0.9rem; 
            margin-bottom: 22px; 
            font-weight: 600;
        }

        .btn-ig {
            display: inline-block;
            background: var(--ig-gradient);
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.2);
            transition: all 0.3s ease;
        }

        .btn-ig:hover { 
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(220, 39, 67, 0.3);
        }

        /* 4. 音樂播放器樣式 */
        .music-player {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 18px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            z-index: 9999;
            border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
            transition: all 0.3s ease;
        }

        .music-player:hover { transform: scale(1.02); }

        .music-player p {
            margin: 0 0 10px 0;
            font-size: 0.85rem;
            color: #0288d1;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        audio { height: 32px; width: 220px; }

        footer {
            text-align: center;
            padding: 60px 0;
            color: #546e7a;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* 5. 手機版適應 (RWD) */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .container {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
                padding: 15px;
            }
            .music-player {
                width: calc(100% - 60px);
                right: 30px;
                left: 30px;
                bottom: 20px;
                padding: 12px;
            }
            audio { width: 100%; }
        }
    </style>
</head>

<script>
    const observerOptions = {
        threshold: 0.15,
        rootMargin: "0px 0px -50px 0px"
    };

    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
            if (entry.isIntersecting) {
                // 卡片依序跳出感
                setTimeout(() => {
                    entry.target.classList.add('show');
                }, index % 4 * 100); 
                observer.unobserve(entry.target);
            }
        });
    }, observerOptions);

    document.querySelectorAll('.card').forEach(card => {
        observer.observe(card);
    });
</script>
