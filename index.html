<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>322 憨包們</title>
    <style>
        :root {
            --header-color: #0288d1;
            --card-bg: rgba(255, 255, 255, 0.95);
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --bg-gradient: linear-gradient(-45deg, #e3f2fd, #bbdefb, #90caf9, #e1f5fe);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0; padding: 20px; overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 歡迎層 */
        #welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient); background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s ease, visibility 0.8s;
        }
        #welcome-overlay.fade-out { opacity: 0; visibility: hidden; }
        .welcome-content {
            text-align: center; background: rgba(255, 255, 255, 0.9);
            padding: 50px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px); animation: slideInWelcome 1s ease-out; max-width: 80%;
        }
        .welcome-content button {
            background: linear-gradient(45deg, #4fc3f7, #0288d1);
            color: white; border: none; padding: 15px 45px; border-radius: 50px;
            font-weight: bold; cursor: pointer; font-size: 1rem;
        }

        /* 氣泡 */
        .bubbles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .bubble {
            position: absolute; bottom: -120px; background: rgba(255, 255, 255, 0.45);
            border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.6);
            animation: floatUp 12s infinite ease-in;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            100% { transform: translateY(-120vh) scale(1.2); opacity: 0; }
        }

        /* 佈局與卡片 */
        header { text-align: center; padding: 60px 0; }
        header h1 { color: var(--header-color); font-size: 3.5rem; letter-spacing: 4px; }
        
        .container {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px; padding-bottom: 50px;
        }
        .card {
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: all 0.5s ease;
            text-align: center; padding-bottom: 25px; opacity: 0; transform: translateY(40px);
        }
        .card.show { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(2, 136, 209, 0.2); }
        .photo-container { width: 100%; height: 300px; overflow: hidden; background-color: #f8f9fa; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .info { padding: 20px; }
        .name { font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; color: #2c3e50; }
        .nickname-tag { display: inline-block; color: #0288d1; background: #e1f5fe; padding: 5px 18px; border-radius: 12px; margin-bottom: 20px; font-weight: 600; }
        .btn-ig { display: inline-block; background: var(--ig-gradient); color: white; padding: 12px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; }

        /* 倒數計時與進度條 */
        .countdown-container {
            max-width: 800px; margin: 40px auto 100px; background: var(--card-bg);
            backdrop-filter: blur(10px); padding: 30px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center;
        }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .time-block { background: #e1f5fe; padding: 15px 5px; border-radius: 15px; color: #0288d1; }
        .time-block span { display: block; font-size: 2.2rem; font-weight: 800; }
        
        .progress-wrapper { margin-top: 25px; padding: 0 10px; }
        .progress-bar-bg { background: #e0e0e0; height: 12px; border-radius: 10px; overflow: hidden; }
        #progress-fill { background: linear-gradient(90deg, #4fc3f7, #0288d1); width: 0%; height: 100%; transition: width 1s ease-out; }

        /* 音樂播放器 */
        .music-player {
            position: fixed; bottom: 25px; right: 25px;
            background: rgba(255, 255, 255, 0.85); padding: 15px; border-radius: 24px; z-index: 9999;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .music-player { left: 20px; right: 20px; width: auto; }
        }
    </style>
</head>
<body>

<div id="welcome-overlay">
    <div class="welcome-content">
        <h1>歡迎來到 322</h1>
        <p>準備好看到一群憨包了嗎？</p>
        <button onclick="closeWelcome()">點擊進入</button>
    </div>
</div>

<div class="bubbles">
    <div class="bubble" style="left:10%"></div>
    <div class="bubble" style="left:30%; animation-delay:2s"></div>
    <div class="bubble" style="left:50%; animation-delay:4s"></div>
    <div class="bubble" style="left:70%; animation-delay:1s"></div>
    <div class="bubble" style="left:90%; animation-delay:3s"></div>
</div>

<header><h1>322 憨包們</h1></header>

<div class="container">
    <div class="card"><div class="photo-container"><img src="p1.jpg" alt="黃崇瑋"></div><div class="info"><div class="name">黃崇瑋</div><span class="nickname-tag">走步哥</span><br><a href="https://www.instagram.com/bennynyhuang" target="_blank" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p2.jpg" alt="林軒漢"></div><div class="info"><div class="name">林軒漢</div><span class="nickname-tag">妮塔</span><br><a href="https://www.instagram.com/linxuanhan97" target="_blank" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p3.jpg" alt="徐堃翔"></div><div class="info"><div class="name">徐堃翔</div><span class="nickname-tag">高工候選人</span><br><a href="https://www.instagram.com/sean.hsu0930" target="_blank" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p4.jpg" alt="廖廷恩"></div><div class="info"><div class="name">廖廷恩</div><span class="nickname-tag">大🍼野豬</span><br><a href="https://www.instagram.com/ed_331ie" target="_blank" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p5.jpg" alt="蔡承烜"></div><div class="info"><div class="name">蔡承烜</div><span class="nickname-tag">雨傘哥</span><br><a href="https://www.instagram.com/pywb30" target="_blank" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p6.jpg" alt="簡宗翰"></div><div class="info"><div class="name">簡宗翰</div><span class="nickname-tag">養身籃球</span><br><a href="https://www.instagram.com/jzh.10.1015" target="_blank" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p7.jpg" alt="鄭子恩"></div><div class="info"><div class="name">鄭子恩</div><span class="nickname-tag">導演</span><br><a href="https://www.instagram.com/hu.hu7557" target="_blank" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p8.jpg" alt="陳緯哲"></div><div class="info"><div class="name">陳緯哲</div><span class="nickname-tag">崇瑋 軒漢父親</span><br><a href="https://www.instagram.com/a0981848508" target="_blank" class="btn-ig">Instagram</a></div></div>
</div>
<div class="countdown-container">
    <h2 class="countdown-title">🎓 距離 115 會考還有</h2>
    <div id="timer" class="timer-grid">
        <div class="time-block"><span id="days">00</span><p>天</p></div>
        <div class="time-block"><span id="hours">00</span><p>時</p></div>
        <div class="time-block"><span id="minutes">00</span><p>分</p></div>
        <div class="time-block"><span id="seconds">00</span><p>秒</p></div>
    </div>
    <div class="progress-wrapper">
        <div class="progress-bar-bg">
            <div id="progress-fill"></div>
        </div>
        <p id="progress-text" style="margin-top:8px; font-size:0.85rem; color:#546e7a; font-weight:bold;">計算中...</p>
    </div>
</div>

<div class="music-player">
    <p style="margin:0 0 8px; font-size:0.8rem; color:#0288d1; font-weight:bold;">🎵 憨包崇瑋電腦課外放歌曲</p>
    <audio id="bg-audio" controls loop><source src="music.mp3" type="audio/mpeg"></audio>
</div>

<footer>&copy; 2026 322 Class Official Website</footer>

<script>
    function closeWelcome() {
        document.getElementById('welcome-overlay').classList.add('fade-out');
        document.getElementById('bg-audio').play().catch(() => {});
    }

    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
            if (entry.isIntersecting) {
                setTimeout(() => entry.target.classList.add('show'), (index % 4) * 150);
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });
    document.querySelectorAll('.card').forEach(card => observer.observe(card));

    function updateExamCountdown() {
        const start = new Date(2025, 7, 30).getTime();
        const end = new Date(2026, 4, 16, 8, 0, 0).getTime();
        const now = new Date().getTime();
        const distance = end - now;

        if (distance < 0) {
            document.querySelector('.countdown-title').innerText = "💪 會考順利！";
            return;
        }

        document.getElementById('days').innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
        document.getElementById('hours').innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        document.getElementById('minutes').innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        document.getElementById('seconds').innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');

        let progress = ((now - start) / (end - start)) * 100;
        progress = Math.max(0, Math.min(100, progress));
        document.getElementById('progress-fill').style.width = progress.toFixed(2) + "%";
        document.getElementById('progress-text').innerText = `時間消耗：${progress.toFixed(2)}% (撐住啊憨包們！)`;
    }

    setInterval(updateExamCountdown, 1000);
    updateExamCountdown();
</script>

</body>
</html>
