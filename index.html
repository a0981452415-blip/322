<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --header-color: #0288d1;
            --accent-blue: #4fc3f7;
            --card-bg: rgba(255, 255, 255, 0.95);
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --bg-gradient: linear-gradient(-45deg, #e3f2fd, #bbdefb, #90caf9, #e1f5fe);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0; padding: 20px; overflow-x: hidden;
            cursor: none; 
        }

        a, button, .playlist-item { cursor: none; }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none;
        }

        /* --- 登入系統 --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 30000; background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .login-box {
            background: rgba(255, 255, 255, 0.9); padding: 50px; border-radius: 30px;
            text-align: center; box-shadow: 0 15px 50px rgba(2, 136, 209, 0.2);
            border: 2px solid var(--header-color); backdrop-filter: blur(10px);
        }
        .login-box input {
            padding: 12px; width: 220px; border-radius: 12px;
            border: 1px solid #ddd; margin: 20px 0;
            font-size: 1.1rem; text-align: center; outline: none; cursor: none;
        }
        #login-error { color: #d32f2f; font-size: 0.9rem; display: none; margin-bottom: 10px; }

        /* --- 藍色拖影 --- */
        .cursor-dot {
            width: 10px; height: 10px;
            background: radial-gradient(circle, var(--accent-blue) 0%, var(--header-color) 100%);
            position: fixed; top: 0; left: 0; border-radius: 50%;
            pointer-events: none; z-index: 40000;
            box-shadow: 0 0 12px var(--accent-blue);
        }

        /* 歡迎層 */
        #welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; transition: opacity 0.8s;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-gradient);
        }
        #welcome-overlay.fade-out { opacity: 0; visibility: hidden; }

        header { text-align: center; padding: 60px 0; }
        header h1 { color: var(--header-color); font-size: 3.5rem; letter-spacing: 4px; }
        
        .container {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px; padding: 20px 20px 100px;
        }
        
        .card {
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; padding-bottom: 25px; 
            opacity: 0; transform: translateY(40px); transition: 0.4s;
            cursor: none;
        }
        .card.show { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(2, 136, 209, 0.2); }
        
        .photo-container { width: 100%; height: 350px; overflow: hidden; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        .name { font-size: 1.6rem; font-weight: 800; color: #2c3e50; margin-bottom: 10px; margin-top: 15px;}
        .nickname-tag { display: inline-block; color: var(--header-color); background: #e1f5fe; padding: 5px 18px; border-radius: 12px; margin-bottom: 20px; font-weight: 600; }
        .btn-ig { display: inline-block; background: var(--ig-gradient); color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; border: none; }

        .countdown-container { max-width: 800px; margin: 0 auto 100px; background: var(--card-bg); padding: 30px; border-radius: 30px; text-align: center; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .time-block { background: #e1f5fe; padding: 15px 5px; border-radius: 15px; color: var(--header-color); }
        .time-block span { display: block; font-size: 2.2rem; font-weight: 800; }
        .music-player { position: fixed; bottom: 25px; right: 25px; width: 260px; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 24px; z-index: 9999; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        footer { text-align: center; padding: 40px; color: #546e7a; font-weight: bold; }
    </style>
</head>

<script>
    function checkPass() {
        if (document.getElementById('pass-input').value === "322") { 
            document.getElementById('login-overlay').style.transform = "translateY(-100%)";
            setTimeout(() => { runTypewriter(document.getElementById('welcome-desc'), "準備好看到這群藍色的憨包了嗎？", 80); }, 600);
        } else { document.getElementById('login-error').style.display = "block"; }
    }

    const dots = document.querySelectorAll('.cursor-dot');
    const mousePos = { x: -100, y: -100 };
    const dotCoords = Array.from({ length: dots.length }, () => ({ x: 0, y: 0 }));
    window.addEventListener('mousemove', (e) => { mousePos.x = e.clientX; mousePos.y = e.clientY; });
    function updateCursorTrail() {
        let targetX = mousePos.x; let targetY = mousePos.y;
        dots.forEach((dot, index) => {
            const coords = dotCoords[index];
            coords.x += (targetX - coords.x) * 0.25; coords.y += (targetY - coords.y) * 0.25;
            dot.style.transform = `translate3d(${coords.x}px, ${coords.y}px, 0) scale(${1 - index * 0.12})`;
            dot.style.opacity = 1 - (index * 0.18);
            targetX = coords.x; targetY = coords.y;
        });
        requestAnimationFrame(updateCursorTrail);
    }
    updateCursorTrail();

    function runTypewriter(element, text, speed) {
        let i = 0; element.innerHTML = '';
        function type() { if (i < text.length) { element.innerHTML += text.charAt(i); i++; setTimeout(type, speed); } }
        type();
    }

    // 音樂清單
    const playlist = [
        { title: "海嶼你", file: "music1.mp3" }, { title: "宗翰獨特品味", file: "music2.mp3" },
        { title: "擊敗人", file: "music3.mp3" }, { title: "步步", file: "music4.mp3" },
        { title: "可惜沒如果", file: "music5.mp3" }, { title: "不該", file: "music6.mp3" },
        { title: "軒漢獨特品味", file: "music7.mp3" }, { title: "擱淺", file: "music8.mp3" },
        { title: "浪子回頭", file: "music9.mp3" }, { title: "浪流蓮", file: "music10.mp3" }
    ];
    let currentIdx = 0;
    const audio = document.getElementById('bg-audio');
    const source = document.getElementById('audio-source');

    function loadSong(i) {
        currentIdx = i; source.src = playlist[i].file;
        document.getElementById('song-title').innerText = "🎵：" + playlist[i].title;
        audio.load(); audio.play().catch(e=>{});
    }
    function nextSong() { loadSong((currentIdx + 1) % playlist.length); }
    function prevSong() { loadSong((currentIdx - 1 + playlist.length) % playlist.length); }
    function shuffleSong() { loadSong(Math.floor(Math.random() * playlist.length)); }

    function closeWelcome() { document.getElementById('welcome-overlay').classList.add('fade-out'); loadSong(0); }

    function countdown() {
        const end = new Date(2026, 4, 16, 8, 0, 0).getTime();
        const diff = end - new Date().getTime();
        if (diff <= 0) return;
        document.getElementById('days').innerText = String(Math.floor(diff / 86400000)).padStart(2, '0');
        document.getElementById('hours').innerText = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
        document.getElementById('minutes').innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
        document.getElementById('seconds').innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
    }
    setInterval(countdown, 1000);

    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();
    class P {
        constructor() { this.reset(); }
        reset() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2+1; this.vy = Math.random()*0.5+0.2; }
        update() { this.y += this.vy; if(this.y > canvas.height) this.reset(); }
        draw() { ctx.fillStyle = "rgba(2, 136, 209, 0.3)"; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill(); }
    }
    for(let i=0; i<60; i++) particles.push(new P());
    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(anim); }
    anim();

    const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('show'); }), {threshold:0.1});
    window.onload = () => { document.querySelectorAll('.card').forEach(c => obs.observe(c)); countdown(); };
    document.getElementById('pass-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPass(); });
</script>
