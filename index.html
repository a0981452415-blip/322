<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>322憨包們 - 流星盛宴</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --header-color: #0288d1;
            --accent-blue: #4fc3f7;
            --card-bg: rgba(255, 255, 255, 0.85);
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            /* 深邃夜空漸層 */
            --bg-gradient: linear-gradient(-45deg, #050b14, #101d2d, #1a2c42, #050b14); 
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0; padding: 20px; overflow-x: hidden;
            cursor: none; 
        }

        /* --- 強化版流星雨 CSS --- */
        .night-sky {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .shooting-star {
            position: absolute;
            height: 2px;
            background: linear-gradient(-45deg, #ffffff, rgba(0, 0, 255, 0));
            filter: drop-shadow(0 0 6px #ffffff);
            border-radius: 999px;
            opacity: 0;
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        }

        /* 每一顆流星設定不同的位置、大小與速度 */
        .shooting-star:nth-child(1) { top: 0%; left: 80%; animation-delay: 0s; }
        .shooting-star:nth-child(2) { top: 10%; left: 60%; animation-delay: 1.2s; animation-duration: 3.5s; transform: scale(0.8); }
        .shooting-star:nth-child(3) { top: 20%; left: 95%; animation-delay: 2.5s; animation-duration: 2.8s; }
        .shooting-star:nth-child(4) { top: 5%; left: 40%; animation-delay: 4s; transform: scale(1.2); }
        .shooting-star:nth-child(5) { top: 15%; left: 75%; animation-delay: 0.5s; animation-duration: 4.2s; }
        .shooting-star:nth-child(6) { top: 25%; left: 50%; animation-delay: 3.2s; }
        .shooting-star:nth-child(7) { top: 30%; left: 85%; animation-delay: 1.8s; transform: scale(0.7); }
        .shooting-star:nth-child(8) { top: 40%; left: 70%; animation-delay: 5s; animation-duration: 3s; }
        .shooting-star:nth-child(9) { top: 50%; left: 90%; animation-delay: 2.2s; }
        .shooting-star:nth-child(10) { top: 5%; left: 100%; animation-delay: 6s; animation-duration: 4s; }

        @keyframes tail { 
            0% { width: 0; } 
            30% { width: 120px; } 
            100% { width: 0; } 
        }

        @keyframes shooting { 
            0% { transform: translateX(0) translateY(0) rotateZ(-45deg); opacity: 1; } 
            100% { transform: translateX(-1000px) translateY(1000px) rotateZ(-45deg); opacity: 0; } 
        }
        /* --- 流星雨結束 --- */

        a, button, .playlist-item, input { cursor: none; }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 30000; background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .login-box {
            background: rgba(255, 255, 255, 0.9); padding: 50px; border-radius: 30px;
            text-align: center; box-shadow: 0 15px 50px rgba(79, 195, 247, 0.3);
            border: 2px solid var(--header-color); backdrop-filter: blur(10px);
        }
        .login-box input {
            padding: 12px; width: 220px; border-radius: 12px;
            border: 1px solid #ddd; margin: 20px 0;
            font-size: 1.1rem; text-align: center; outline: none;
        }

        .cursor-dot {
            width: 10px; height: 10px;
            background: radial-gradient(circle, var(--accent-blue) 0%, var(--header-color) 100%);
            position: fixed; top: 0; left: 0; border-radius: 50%;
            pointer-events: none; z-index: 40000;
            box-shadow: 0 0 12px var(--accent-blue);
        }

        header { position: relative; z-index: 10; text-align: center; padding: 40px 0; }
        header h1 { color: #fff; font-size: 3.5rem; letter-spacing: 6px; text-shadow: 0 0 20px rgba(79, 195, 247, 0.8); }
        
        .container {
            position: relative; z-index: 10;
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px; padding-bottom: 60px;
        }
        
        .card {
            background: var(--card-bg); border-radius: 24px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; padding-bottom: 25px; 
            opacity: 0; transform: translateY(40px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.4);
        }
        .card.show { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-15px) scale(1.05); box-shadow: 0 25px 50px rgba(79, 195, 247, 0.4); background: rgba(255, 255, 255, 1); }

        .photo-container { width: 100%; height: 300px; background: #eee; overflow: hidden; position: relative; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .card:hover .photo-container img { transform: scale(1.15); }

        .name { font-size: 1.6rem; font-weight: 800; margin-top: 15px; color: #1a2c42; }
        .nickname-tag { display: inline-block; color: #fff; background: var(--header-color); padding: 5px 15px; border-radius: 10px; margin: 10px 0; font-weight: 600;}
        .btn-ig { display: inline-block; background: var(--ig-gradient); color: white; padding: 10px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; border: none; transition: 0.3s; }
        
        .msg-board, .countdown-container { position: relative; z-index: 10; max-width: 700px; margin: 0 auto 50px; background: var(--card-bg); padding: 25px; border-radius: 25px; border: 2px solid var(--accent-blue); backdrop-filter: blur(10px); }
        .msg-input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .msg-input-area input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        .msg-list { max-height: 300px; overflow-y: auto; }
        .msg-item { background: rgba(240, 250, 255, 0.8); padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 5px solid var(--header-color); text-align: left;}

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .time-block { background: rgba(2, 136, 209, 0.1); padding: 10px; border-radius: 12px; }
        .time-block span { display: block; font-size: 2rem; font-weight: 800; color: var(--header-color); }
        
        .music-player { position: fixed; bottom: 20px; right: 20px; width: 260px; background: rgba(255,255,255,0.95); padding: 15px; border-radius: 24px; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.2); backdrop-filter: blur(5px); border: 1px solid var(--accent-blue); }
    </style>
</head>
<body>

<div class="night-sky">
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
</div>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:var(--header-color)">322 基地入口</h2>
        <input type="password" id="pass-input" placeholder="請輸入暗號..." onkeydown="if(event.key==='Enter') checkPass()">
        <br><button class="btn-ig" onclick="checkPass()">確認身分</button>
    </div>
</div>

<div class="cursor-dot"></div><div class="cursor-dot"></div><div class="cursor-dot"></div><div class="cursor-dot"></div><div class="cursor-dot"></div>

<header><h1>✨ 322 憨包們 ✨</h1></header>

<div class="container">
    <div class="card"><div class="photo-container"><img src="p1.jpg"></div><div class="info"><div class="name">黃崇瑋</div><span class="nickname-tag">走步哥</span><br><a href="https://www.instagram.com/bennynyhuang" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p2.jpg"></div><div class="info"><div class="name">林軒漢</div><span class="nickname-tag">妮塔</span><br><a href="https://www.instagram.com/linxuanhan97" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p3.jpg"></div><div class="info"><div class="name">徐堃翔</div><span class="nickname-tag">高工候選人</span><br><a href="https://www.instagram.com/sean.hsu0930" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p4.jpg"></div><div class="info"><div class="name">廖廷恩</div><span class="nickname-tag">大🍼野豬</span><br><a href="https://www.instagram.com/ed_331ie" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p5.jpg"></div><div class="info"><div class="name">蔡承烜</div><span class="nickname-tag">雨傘哥</span><br><a href="https://www.instagram.com/pywb30" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p6.jpg"></div><div class="info"><div class="name">簡宗翰</div><span class="nickname-tag">養身籃球</span><br><a href="https://www.instagram.com/jzh.10.1015" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p7.jpg"></div><div class="info"><div class="name">鄭子恩</div><span class="nickname-tag">導演</span><br><a href="https://www.instagram.com/hu.hu7557" class="btn-ig">Instagram</a></div></div>
    <div class="card"><div class="photo-container"><img src="p8.jpg"></div><div class="info"><div class="name">陳緯哲</div><span class="nickname-tag">崇瑋 軒漢父親</span><br><a href="https://www.instagram.com/a0981848508" class="btn-ig">Instagram</a></div></div>
</div>

<div class="msg-board">
    <h3 style="color:var(--header-color); text-align:center;">💬 基地留言板</h3>
    <div class="msg-input-area">
        <input type="text" id="msg-input" placeholder="留句話吧..." onkeydown="if(event.key==='Enter') sendMsg()">
        <button class="btn-ig" onclick="sendMsg()">送出</button>
    </div>
    <div id="msg-list" class="msg-list"></div>
</div>

<div class="countdown-container">
    <h3 style="color:var(--header-color)">🎓 115 會考倒數計時</h3>
    <div id="timer" class="timer-grid">
        <div class="time-block"><span id="days">00</span><p>天</p></div>
        <div class="time-block"><span id="hours">00</span><p>時</p></div>
        <div class="time-block"><span id="minutes">00</span><p>分</p></div>
        <div class="time-block"><span id="seconds">00</span><p>秒</p></div>
    </div>
</div>

<div class="music-player">
    <p id="song-title" style="font-size:0.85rem; font-weight:bold; color:#0288d1; margin:0 0 10px 0;">🎵 準備播放...</p>
    <audio id="bg-audio"><source id="audio-source" src="music1.mp3"></audio>
    <button onclick="shuffleSong()" style="width:100%; border:none; background:#e1f5fe; color:#0288d1; padding:8px; border-radius:12px; font-weight:bold;">換一首隨機音樂</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAH3XXkYfepg-EfQkFAelq8f7d2Yk9JA74",
      authDomain: "project-1673660731296559126.firebaseapp.com",
      projectId: "project-1673660731296559126",
      storageBucket: "project-1673660731296559126.firebasestorage.app",
      messagingSenderId: "475041608650",
      appId: "1:475041608650:web:59e544b5f9a8dca98c1533",
      databaseURL: "https://project-1673660731296559126-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkPass() {
        const input = document.getElementById('pass-input');
        const overlay = document.getElementById('login-overlay');
        if (input.value === "322") { 
            overlay.style.transform = "translateY(-100%)";
            shuffleSong();
        } else {
            input.style.border = "2px solid #ff5252";
            input.animate([{ transform: 'translateX(-5px)' }, { transform: 'translateX(5px)' }, { transform: 'translateX(0)' }], { duration: 300 });
            alert("暗號錯誤！");
        }
    }

    function sendMsg() {
        const input = document.getElementById('msg-input');
        if (input.value.trim() === "") return;
        const now = new Date();
        db.ref('messages').push({
            text: input.value,
            time: `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`,
            timestamp: Date.now()
        });
        input.value = "";
    }

    db.ref('messages').limitToLast(20).on('value', (snapshot) => {
        const list = document.getElementById('msg-list');
        list.innerHTML = "";
        const data = snapshot.val();
        if (data) {
            Object.values(data).reverse().forEach(msg => {
                const div = document.createElement('div');
                div.className = 'msg-item';
                div.innerHTML = `<strong>匿名憨包</strong> <small>${msg.time}</small><br>${msg.text}`;
                list.appendChild(div);
            });
        }
    });

    const dots = document.querySelectorAll('.cursor-dot');
    let mouseX = 0, mouseY = 0;
    window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    function moveDots() {
        dots.forEach((dot, index) => {
            dot.style.left = mouseX + 'px';
            dot.style.top = mouseY + 'px';
            dot.style.opacity = 1 - (index * 0.2);
        });
        requestAnimationFrame(moveDots);
    }
    moveDots();

    function updateCountdown() {
        const end = new Date(2026, 4, 16, 8, 0, 0).getTime();
        const now = new Date().getTime();
        const diff = end - now;
        if (diff < 0) return;
        document.getElementById('days').innerText = Math.floor(diff / 86400000);
        document.getElementById('hours').innerText = Math.floor((diff % 86400000) / 3600000);
        document.getElementById('minutes').innerText = Math.floor((diff % 3600000) / 60000);
        document.getElementById('seconds').innerText = Math.floor((diff % 60000) / 1000);
    }
    setInterval(updateCountdown, 1000);

    const playlist = ["music1.mp3", "music2.mp3", "music3.mp3", "music4.mp3", "music5.mp3", "music6.mp3", "music7.mp3", "music8.mp3", "music9.mp3", "music10.mp3"];
    function shuffleSong() {
        const audio = document.getElementById('bg-audio');
        const songName = playlist[Math.floor(Math.random() * playlist.length)];
        document.getElementById('audio-source').src = songName;
        document.getElementById('song-title').innerText = "🎵 正在播放：" + songName;
        audio.load();
        audio.play().catch(() => {});
    }

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('show'); });
    });
    window.onload = () => { 
        document.querySelectorAll('.card').forEach(c => observer.observe(c)); 
        updateCountdown(); 
    };
</script>
</body>
</html>
