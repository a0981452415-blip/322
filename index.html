@keyframes neonPulse {
    0% {
        /* 初始狀態：較淡、較窄的陰影 */
        text-shadow: 
            0 0 7px rgba(79, 195, 247, 0.3),
            0 0 10px rgba(79, 195, 247, 0.3);
    }
    50% {
        /* 中間狀態：最亮、最寬的陰影，模擬霓虹燈全開 */
        text-shadow: 
            0 0 10px rgba(79, 195, 247, 0.8),
            0 0 20px rgba(79, 195, 247, 0.8),
            0 0 30px rgba(79, 195, 247, 0.6),
            0 0 40px rgba(79, 195, 247, 0.4);
    }
    100% {
        /* 回到初始狀態 */
        text-shadow: 
            0 0 7px rgba(79, 195, 247, 0.3),
            0 0 10px rgba(79, 195, 247, 0.3);
    }
}

/* 2. 建立套用的類別 */
.neon-glow {
    /* 設定文字基本顏色（通常選用較淡的色調） */
    color: #e1f5fe; 
    /* 執行動畫：2秒循環一次，平滑過渡，無限播放 */
    animation: neonPulse 2s infinite ease-in-out;
    /* 優化：告訴瀏覽器這準備要動，提前掛載到 GPU */
    will-change: text-shadow; 
}
        /* 定義金色流動動畫 */
@keyframes goldFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.daily-gold-title {

        #fff5b7 25%, 
        #ffae00 50%, 
        #fff5b7 75%, 
        #ffd700 100%
    );

    /* 核心：將背景剪裁成文字形狀 */
    -webkit-background-clip: text;
    background-clip: text;
    
    /* 必須將文字顏色設為透明，底部的金色背景才會顯現 */
    color: transparent;
    
    /* 執行動畫：3秒循環一次，線性無限播放 */

    // --- 音樂邏輯 ---
    let audioCtx, analyser, dataArray, animId;
    const playlist = Array.from({length: 12}, (_, i) => `music${i+1}.mp3`);
    let trackIdx = 0;
    const audio = new Audio(playlist[trackIdx]);
    audio.crossOrigin = "anonymous";

    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        const source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        analyser.fftSize = 64;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
    }

    function drawSpectrum() {
        animId = requestAnimationFrame(drawSpectrum);
        analyser.getByteFrequencyData(dataArray);
        const leftBars = document.querySelectorAll('#viz-left .bar');
        const rightBars = document.querySelectorAll('#viz-right .bar');
        const indices = [2, 6, 12, 20];
        indices.forEach((idx, i) => {
            const h = Math.max(15, (dataArray[idx] / 255) * 100);
            if(leftBars[i]) leftBars[i].style.height = `${h}%`;
            if(rightBars[i]) rightBars[i].style.height = `${h}%`;
        });
    }

    function toggleMusic() {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (audio.paused) {
            audio.play();
            document.getElementById('play-btn').innerText = "⏸";
            drawSpectrum();
        } else {
            audio.pause();
            document.getElementById('play-btn').innerText = "▶️";
            cancelAnimationFrame(animId);
        }
    }

    function nextSong() {

    function renderCards() {
        const container = document.getElementById('members-container');
        container.innerHTML = ""; // 清空容器

        members.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="photo-container" onclick='openModal(${JSON.stringify(m)})'>
                    <img src="${m.img}" alt="${m.name}" onerror="this.src='https://via.placeholder.com/300?text=322'">
                </div>
                <div class="name" onclick='openModal(${JSON.stringify(m)})'>${m.name}</div>
                <div class="nickname-tag">${m.tag}</div>
                <div class="actions">
                    <a href="https://instagram.com/${m.ig}" target="_blank" class="btn-ig">IG</a>

                    </div>
                </div>
            `;
            container.appendChild(card);
            
            // 監聽 Firebase 資料更新點讚數
            db.ref('likes/' + m.id).on('value', snap => {
                document.getElementById(`count-${m.id}`).innerText = snap.val() || 0;
            });

            // 啟動進場動畫
            setTimeout(() => observer.observe(card), 100);
        });

    function renderDailyMember() {
        const display = document.getElementById('daily-member-display');
        const now = new Date();
        const dateSeed = now.getFullYear() * 10000 + (now.getMonth() + 1) * 100 + now.getDate();

        display.innerHTML = `
            <div style="display: flex; align-items: center; justify-content: center; gap: 20px; padding: 10px;">

// --- 極致絲滑版：心靈雞湯邏輯 ---
function serveSoup() {
    const textElement = document.getElementById('soup-text');
    const btn = document.querySelector('.btn-soup');
    
    // 1. 鎖定按鈕，避免連點混亂
    btn.disabled = true;
    btn.style.opacity = "0.7";
    btn.innerText = "熬煮中... 🥣";

    // 2. 第一階段：縮小並淡出 (啟動 GPU 加速)
    textElement.style.transition = "all 0.4s cubic-bezier(0.4, 0, 0.2, 1)";
    textElement.style.opacity = "0";
    textElement.style.transform = "scale(0.95)";

    // 3. 第二階段：等待淡出完成後換字
    setTimeout(() => {
        let newQuote;
        do {
            newQuote = soupQuotes[Math.floor(Math.random() * soupQuotes.length)];
        } while (`「 ${newQuote} 」` === textElement.innerText);
        
        textElement.innerText = `「 ${newQuote} 」`;

        // 4. 第三階段：重新放大並淡入
        // 稍微延遲 50ms 確保手機瀏覽器捕捉到內容更換
        setTimeout(() => {
            textElement.style.opacity = "1";
            textElement.style.transform = "scale(1)";
            
            // 5. 恢復按鈕狀態
            setTimeout(() => {
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.innerText = "爽拉 再來一碗";
            }, 400);
        }, 50);
    }, 400); 
}
    function addLike(id) {
        const btn = document.getElementById(`btn-like-${id}`);
        btn.classList.add('heart-pop');
        confetti({ particleCount: 40, spread: 50, origin: { y: 0.9 }, colors: ['#ff0000', '#ff69b4'] });
        setTimeout(() => btn.classList.remove('heart-pop'), 400);
        db.ref('likes/'+id).transaction(c => (c || 0) + 1);
    }

    function openModal(m) {
        document.getElementById('modal-img').src = m.img;
        document.getElementById('modal-name').innerText = m.name;
        document.getElementById('modal-tag').innerText = m.tag;
        document.getElementById('modal-quote').innerText = m.quote;
        document.getElementById('member-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('member-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function postMessage() {
        const n = document.getElementById('user-name'), m = document.getElementById('user-msg');
        if (!m.value.trim()) return;
        db.ref('messages').push({ name: n.value.trim() || "匿名憨包", content: m.value.trim(), ts: Date.now() });
        m.value = "";
    }

    db.ref('messages').limitToLast(15).on('value', snap => {
        const list = document.getElementById('message-list'), data = snap.val();
        list.innerHTML = "";
        if (data) Object.values(data).reverse().forEach(msg => {
            list.innerHTML += `<div class="msg-item"><strong>${msg.name}</strong>: ${msg.content}</div>`;
        });
    });

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('show'); });
    }, { threshold: 0.1 });

    window.addEventListener('mousemove', e => {
        const dot = document.getElementById('dot1');
        dot.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
    });

    window.onload = () => {
        createStars();
        renderDailyMember(); 
        serveSoup(); // 網頁載入時先裝一碗雞湯
        renderCards();
        setInterval(() => {
        
            const target = new Date(2026, 4, 16, 8, 0).getTime();
            const diff = target - Date.now();
            if (diff > 0) {
                document.getElementById('days').innerText = String(Math.floor(diff / 86400000)).padStart(2, '0');
                document.getElementById('hours').innerText = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
                document.getElementById('minutes').innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                document.getElementById('seconds').innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
            }
        }, 1000);
    };
