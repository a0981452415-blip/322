<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT // 322 PROTOCOL</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --v-red: #ff4655;
            --v-black: #0f1923;
            --v-white: #ece8e1;
            --v-teal: #00f5d4;
            --v-dark: #1f2326;
            --bg-gradient: linear-gradient(135deg, #0f1923 0%, #1f2326 100%);
        }

        body {
            font-family: 'Rajdhani', 'PingFang TC', sans-serif;
            background: var(--v-black);
            color: var(--v-white);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* 掃描線特效 */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 99999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* --- 登入介面 --- */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 100000; background: var(--v-black); 
            display: flex; justify-content: center; align-items: center;
            transition: 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .login-box { 
            border: 1px solid var(--v-red); 
            padding: 60px; 
            background: rgba(255, 70, 85, 0.05);
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
            text-align: center;
        }

        .v-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--v-white);
            color: var(--v-white);
            font-size: 1.5rem;
            text-align: center;
            outline: none;
            margin: 20px 0;
            font-family: 'Rajdhani';
        }

        /* --- 按鈕樣式 --- */
        .v-btn {
            background: var(--v-red);
            color: var(--v-white);
            border: none;
            padding: 12px 40px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
            font-family: 'Rajdhani';
        }
        .v-btn:hover { transform: skewX(-5deg); filter: brightness(1.2); }

        /* --- 標題 --- */
        header { text-align: left; padding: 40px; border-left: 8px solid var(--v-red); margin-bottom: 40px; }
        header h1 { 
            font-size: 4rem; margin: 0; text-transform: uppercase; font-weight: 900;
            letter-spacing: -2px; line-height: 0.9;
        }
        #quote-display { color: var(--v-red); font-weight: bold; margin-top: 10px; }

        /* --- 卡片設計 --- */
        .container { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; max-width: 1400px; margin: 0 auto; 
        }

        .card { 
            background: var(--v-dark); 
            border: 1px solid rgba(236, 232, 225, 0.1);
            position: relative;
            transition: 0.3s;
            overflow: hidden;
            cursor: pointer;
        }

        .card:hover { border-color: var(--v-teal); transform: translateY(-5px); }

        .photo-container { height: 300px; overflow: hidden; background: #333; position: relative; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(0.5); transition: 0.5s; }
        .card:hover img { filter: grayscale(0); scale: 1.1; }

        .agent-info { padding: 15px; border-top: 4px solid var(--v-red); }
        .name { font-size: 1.8rem; font-weight: bold; text-transform: uppercase; }
        .tag { color: var(--v-teal); font-size: 0.9rem; letter-spacing: 1px; }

        /* --- 模組容器 --- */
        .module-container { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; margin-bottom: 30px;
            position: relative;
        }
        .module-title { color: var(--v-red); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        /* --- 倒數計時 --- */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .time-block { background: var(--v-red); color: white; padding: 15px; text-align: center; }
        .time-block span { font-size: 2.5rem; font-weight: 900; display: block; }

        /* --- 音樂播放器 --- */
        #music-player {
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--v-red);
            height: 60px; display: none; align-items: center; padding: 0 40px;
            z-index: 9999; color: white; box-sizing: border-box;
        }

        /* 彈窗樣式 */
        #member-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 25, 35, 0.95); z-index: 110000; 
            display: none; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: var(--v-dark); width: 90%; max-width: 500px; 
            border: 2px solid var(--v-teal); padding: 40px; position: relative;
        }

    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:var(--v-red)">// ACCESSING ENCRYPTED DATA</h2>
        <input type="password" id="pass-input" class="v-input" placeholder="PASSCODE" onkeydown="if(event.key==='Enter') checkPass()">
        <br><button class="v-btn" onclick="checkPass()">Initialize Protocol</button>
    </div>
</div>

<header>
    <h1>322 // PROTOCOL</h1>
    <div id="quote-display">INITIALIZING TACTICAL OVERVIEW...</div>
</header>

<div class="container">
    <div class="module-container" style="grid-column: 1 / -1; border-color: var(--v-teal);">
        <div class="module-title" style="color:var(--v-teal)">★ Highlight Agent of the Day ★</div>
        <div id="daily-member-display"></div>
    </div>

    <div class="module-container" style="grid-column: span 2;">
        <div class="module-title">Spike Detonation Countdown // 會考</div>
        <div id="timer" class="timer-grid">
            <div class="time-block"><span id="days">00</span>D</div>
            <div class="time-block"><span id="hours">00</span>H</div>
            <div class="time-block"><span id="minutes">00</span>M</div>
            <div class="time-block"><span id="seconds">00</span>S</div>
        </div>
    </div>

    <div class="module-container" style="grid-column: span 2;">
        <div class="module-title">Comm Link // 戰術討論</div>
        <div id="message-list" style="height:150px; overflow-y:auto; margin-bottom:10px; background:rgba(0,0,0,0.2); padding:10px;"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="user-msg" class="v-input" style="margin:0; flex:1; font-size:1rem; text-align:left;" placeholder="TYPE MESSAGE...">
            <button class="v-btn" onclick="postMessage()">Send</button>
        </div>
    </div>
</div>

<div class="container" id="members-container" style="margin-top:40px;"></div>

<div id="member-modal" onclick="if(event.target.id==='member-modal') closeModal()">
    <div class="modal-content">
        <div style="color:var(--v-teal); font-size:0.8rem; margin-bottom:10px;">// AGENT_DOSSIER</div>
        <h2 id="modal-name" class="name"></h2>
        <div id="modal-tag" class="tag"></div>
        <p id="modal-quote" style="background:rgba(255,255,255,0.05); padding:20px; border-left:4px solid var(--v-red);"></p>
        <button class="v-btn" style="background:var(--v-teal); color:var(--v-black)" onclick="closeModal()">Close</button>
    </div>
</div>

<div id="music-player">
    <div id="current-track-name" style="font-weight:bold; flex:1;">// CHANNEL IDLE</div>
    <div style="display:flex; gap:20px;">
        <button onclick="prevSong()" style="background:none; border:none; color:white; cursor:pointer;">PREV</button>
        <button id="play-btn" onclick="toggleMusic()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">▶</button>
        <button onclick="nextSong()" style="background:none; border:none; color:white; cursor:pointer;">NEXT</button>
    </div>
</div>

<script>
    // --- 同原本的資料結構 ---
    const members = [
        { id: "m1", name: "黃崇瑋", tag: "走步哥", ig: "bennynyhuang", img: "p1.jpg", quote: "相聚有時，後會無期" },
        { id: "m2", name: "林軒漢", tag: "妮塔", ig: "linxuanhan97", img: "p2.jpg", quote: "其實上課睡覺玩手機也能考 100" },
        { id: "m3", name: "徐堃翔", tag: "高工候選人", ig: "sean.hsu0930", img: "p3.jpg", quote: "清明時節雨坤坤 路上行人梳中分" },
        { id: "m4", name: "廖廷恩", tag: "大野豬", ig: "ed_331ie", img: "p4.jpg", quote: "我沒有 就跟你說不是我" },
        { id: "m5", name: "蔡承烜", tag: "雨傘哥", ig: "pywb30", img: "p5.jpg", quote: "我家在大肚。" },
        { id: "m6", name: "簡宗翰", tag: "養身籃球", ig: "jzh.10.1015", img: "p6.jpg", quote: "徐堃翔真的是智障。" },
        { id: "m7", name: "鄭子恩", tag: "導演", ig: "hu.hu7557", img: "p7.jpg", quote: "ผัดกะเพราหมูไม่เผ็ด 打拋豬不要辣" },
        { id: "m8", name: "陳緯哲", tag: "崇瑋軒漢之父", ig: "a0981848508", img: "p8.jpg", quote: "崇瑋軒漢還不快點叫爸爸。" },
        { id: "m10", name: "林錫諄", tag: "全男生的長輩", ig: "1210_linxizhun", img: "p10.jpg", quote: "我真的沒偷你球" },
        { id: "m9", name: "趙峻霆", tag: "鬍子哥", ig: "venus_tt314", img: "p9.jpg", quote: "我愛染頭髮 跟雞窩一樣" },
        { id: "m11", name: "楊東嶧", tag: "JA MORANT", ig: "dongdongyuyuan", img: "p11.jpg", quote: "我是居仁JA MORANT" },
        { id: "m12", name: "陳奕ㄢ", tag: "拉屎哥", ig: "dreamcomelo", img: "p12.jpg", quote: "暫無" },
        { id: "m13", name: "林X享", tag: "釣魚哥", ig: "", img: "p13.jpg", quote: "我是釣魚哥 我最喜歡RICK ROLL了" },
        { id: "m14", name: "簡子甯", tag: "泡麵哥", ig: "", img: "p14.jpg", quote: "我愛gta傻逼才開掛" }
    ];

    const playlist = [        
        { src: "music1.mp3",  name: "冷空氣" },
        { src: "music2.mp3",  name: "宗翰特殊癖好" },
        { src: "music3.mp3",  name: "擊敗人" },
        { src: "music4.mp3",  name: "步步" },
        { src: "music5.mp3",  name: "可惜沒如果" },
        { src: "music6.mp3",  name: "糾董 不該" },
        { src: "music7.mp3",  name: "軒漢特殊品味" },
        { src: "music8.mp3",  name: "RICK ROLL ALERT" },
        { src: "music9.mp3",  name: "茄子DAMN" },
        { src: "music11.mp3", name: "海闊天空" },
        { src: "music12.mp3", name: "乾杯" },
        { src: "music13.mp3", name: "海嶼你" }
    ];

    // --- Firebase 配置 (維持原樣) ---
    const firebaseConfig = {
      apiKey: "AIzaSyAH3XXkYfepg-EfQkFAelq8f7d2Yk9JA74",
      authDomain: "project-1673660731296559126.firebaseapp.com",
      projectId: "project-1673660731296559126",
      databaseURL: "https://project-1673660731296559126-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let trackIdx = 0;
    const audio = new Audio(playlist[trackIdx].src);

    function checkPass() {
        const password = document.getElementById('pass-input').value;
        if (password === "best322") { 
            document.getElementById('login-overlay').style.transform = "translateY(-100%)";
            document.getElementById('music-player').style.display = 'flex';
            startQuotes();
            renderCards();
            renderDailyMember();
        } else { alert("ACCESS DENIED: INVALID PASSCODE"); }
    }

    function renderCards() {
        const container = document.getElementById('members-container');
        container.innerHTML = ""; 
        members.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="photo-container" onclick='openModalById("${m.id}")'>
                    <img src="${m.img}" onerror="this.src='https://via.placeholder.com/300/0f1923/ff4655?text=AGENT'">
                </div>
                <div class="agent-info">
                    <div class="name">${m.name}</div>
                    <div class="tag">// ${m.tag}</div>
                    <div style="margin-top:10px; display:flex; justify-content:space-between; align-items:center;">
                        <a href="https://instagram.com/${m.ig}" target="_blank" style="color:var(--v-white); text-decoration:none; font-size:0.8rem; border:1px solid var(--v-white); padding:2px 8px;">IG_LINK</a>
                        <span id="count-${m.id}" style="color:var(--v-red); font-weight:bold;">0</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
            db.ref('likes/' + m.id).on('value', snap => {
                const countSpan = document.getElementById(`count-${m.id}`);
                if (countSpan) countSpan.innerText = `❤️ ${snap.val() || 0}`;
            });
        });
    }

    function renderDailyMember() {
        const display = document.getElementById('daily-member-display');
        const m = members[new Date().getDate() % members.length];
        display.innerHTML = `
            <div style="display:flex; align-items:center; gap:30px;">
                <img src="${m.img}" style="width:100px; height:100px; border:3px solid var(--v-teal); object-fit:cover;">
                <div>
                    <h2 style="margin:0; font-size:2rem;">${m.name}</h2>
                    <p style="color:var(--v-teal)">DANGER LEVEL: CRITICAL // ${m.tag}</p>
                    <p style="font-style:italic">"${m.quote}"</p>
                </div>
            </div>
        `;
    }

    // --- 倒數計時器 ---
    setInterval(() => {
        const target = new Date(2026, 4, 16, 8, 0).getTime(); 
        const diff = target - Date.now();
        if (diff > 0) {
            document.getElementById('days').innerText = String(Math.floor(diff / 86400000)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
        }
    }, 1000);

    // --- 留言板邏輯 ---
    function postMessage() {
        const m = document.getElementById('user-msg');
        if (!m.value.trim()) return;
        db.ref('messages').push({ name: "AGENT_ANON", content: m.value.trim(), ts: Date.now() });
        m.value = "";
    }

    db.ref('messages').limitToLast(10).on('value', snap => {
        const list = document.getElementById('message-list');
        list.innerHTML = "";
        const data = snap.val();
        if (data) Object.values(data).reverse().forEach(msg => {
            list.innerHTML += `<div style="margin-bottom:5px; font-size:0.9rem;"><span style="color:var(--v-red)">[MSG]</span> ${msg.content}</div>`;
        });
    });

    // --- 音樂控制 ---
    function toggleMusic() {
        if (audio.paused) { audio.play(); document.getElementById('play-btn').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('play-btn').innerText = "▶"; }
        document.getElementById('current-track-name').innerText = `// PLAYING: ${playlist[trackIdx].name}`;
    }

    function openModalById(id) {
        const m = members.find(member => member.id === id);
        if (m) {
            document.getElementById('modal-name').innerText = m.name;
            document.getElementById('modal-tag').innerText = `// ${m.tag}`;
            document.getElementById('modal-quote').innerText = m.quote;
            document.getElementById('member-modal').style.display = 'flex';
        }
    }

    function closeModal() { document.getElementById('member-modal').style.display = 'none'; }

    function startQuotes() {
        const q = ["READY TO DEPLOY.", "ALL SYSTEMS NOMINAL.", "SPIKE LOCATED.", "DEFUSING..."];
        let i = 0;
        setInterval(() => {
            document.getElementById('quote-display').innerText = `// ${q[i]}`;
            i = (i + 1) % q.length;
        }, 3000);
    }
</script>
</body>
</html>
