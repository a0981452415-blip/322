<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>322 憨包們</title>
    <style>
        :root {
            --header-color: #0288d1;
            --card-bg: rgba(255, 255, 255, 0.95);
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --bg-gradient: linear-gradient(-45deg, #e3f2fd, #bbdefb, #90caf9, #e1f5fe);
        }

        /* 1. 全域樣式與流動背景 */
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. 歡迎遮罩層 (Splash Screen) */
        #welcome-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        #welcome-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .welcome-content {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
            animation: slideInWelcome 1s ease-out;
            max-width: 80%;
        }

        .welcome-content h1 { color: var(--header-color); font-size: 3rem; margin: 0 0 10px 0; }
        .welcome-content p { color: #546e7a; margin-bottom: 30px; font-size: 1.1rem; }
        .welcome-content button {
            background: linear-gradient(45deg, #4fc3f7, #0288d1);
            color: white; border: none; padding: 15px 45px;
            border-radius: 50px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(2, 136, 209, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1rem;
        }
        .welcome-content button:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(2, 136, 209, 0.4); }

        @keyframes slideInWelcome {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* 3. 夢幻氣泡層 */
        .bubbles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -120px;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
            animation: floatUp 12s infinite ease-in;
        }

        .bubble:nth-child(1) { width: 80px; height: 80px; left: 10%; animation-duration: 10s; }
        .bubble:nth-child(2) { width: 30px; height: 30px; left: 25%; animation-duration: 15s; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 50px; height: 50px; left: 40%; animation-duration: 13s; animation-delay: 4s; }
        .bubble:nth-child(4) { width: 25px; height: 25px; left: 55%; animation-duration: 18s; animation-delay: 1s; }
        .bubble:nth-child(5) { width: 60px; height: 60px; left: 70%; animation-duration: 12s; animation-delay: 3s; }
        .bubble:nth-child(6) { width: 40px; height: 40px; left: 85%; animation-duration: 16s; animation-delay: 5s; }
        .bubble:nth-child(7) { width: 35px; height: 35px; left: 5%; animation-duration: 14s; animation-delay: 7s; }
        .bubble:nth-child(8) { width: 55px; height: 55px; left: 92%; animation-duration: 11s; animation-delay: 2s; }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            50% { transform: translateY(-50vh) translateX(30px) scale(1.1); }
            100% { transform: translateY(-120vh) translateX(-20px) scale(1.2); opacity: 0; }
        }

        /* 4. 內容佈局 */
        header { text-align: center; padding: 60px 0; }
        header h1 { 
            color: var(--header-color); 
            font-size: 3.5rem; 
            text-shadow: 2px 2px 8px rgba(2, 136, 209, 0.2); 
            letter-spacing: 4px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 35px;
            padding-bottom: 150px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            padding-bottom: 25px;
            position: relative;
            opacity: 0;
            transform: translateY(40px);
        }

        .card.show { opacity: 1; transform: translateY(0); }
        .card:hover { transform: translateY(-15px) scale(1.02); box-shadow: 0 25px 50px rgba(2, 136, 209, 0.25); z-index: 10; }

        .photo-container { width: 100%; height: 300px; overflow: hidden; background-color: #f8f9fa; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; transition: all 0.6s ease; filter: grayscale(15%); }
        .card:hover .photo-container img { transform: scale(1.1) rotate(1deg); filter: grayscale(0%); }

        .info { padding: 20px; }
        .name { font-size: 1.6rem; font-weight: 800; margin-bottom: 10px; color: #2c3e50; }
        .nickname-tag { 
            display: inline-block; color: #0288d1; background: #e1f5fe;
            padding: 5px 18px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 22px; font-weight: 600;
        }

        .btn-ig {
            display: inline-block; background: var(--ig-gradient);
            color: white; padding: 12px 35px; border-radius: 50px;
            text-decoration: none; font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(220, 39, 67, 0.2);
            transition: all 0.3s ease;
        }
        .btn-ig:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(220, 39, 67, 0.4); }

        /* 5. 音樂播放器 */
        .music-player {
            position: fixed; bottom: 25px; right: 25px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 18px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            z-index: 9999; border: 1px solid rgba(255,255,255,0.5);
            text-align: center;
        }
        .music-player p { margin: 0 0 10px 0; font-weight: bold; color: #0288d1; font-size: 0.9rem; }
        audio { height: 32px; width: 220px; }

        footer { text-align: center; padding: 40px; color: #666; font-size: 0.9rem; }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .music-player { width: calc(100% - 60px); left: 30px; bottom: 20px; }
            audio { width: 100%; }
        }
    </style>
</head>
<body>

<script>
    // 1. 關閉歡迎遮罩層並嘗試播放音樂
    function closeWelcome() {
        const overlay = document.getElementById('welcome-overlay');
        const audio = document.getElementById('bg-audio');
        
        overlay.classList.add('fade-out');
        
        // 使用者互動後嘗試自動播放音樂
        audio.play().catch(error => {
            console.log("自動播放被攔截，需手動開啟音樂。");
        });
    }

    // 2. 捲動偵測與卡片顯示動畫
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
            if (entry.isIntersecting) {
                setTimeout(() => {
                    entry.target.classList.add('show');
                }, (index % 4) * 150); 
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.card').forEach(card => observer.observe(card));
</script>
