<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>322憨包們</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --header-color: #0288d1;
            --accent-blue: #4fc3f7;
            --card-bg: rgba(255, 255, 255, 0.85);
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --bg-gradient: linear-gradient(-45deg, #050b14, #101d2d, #1a2c42, #050b14); 
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0; padding: 20px; overflow-x: hidden;
            cursor: none; 
        }

        /* --- 特效層 --- */
        .night-sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .shooting-star {
            position: absolute; height: 2px; background: linear-gradient(-45deg, #ffffff, rgba(0, 0, 255, 0));
            filter: drop-shadow(0 0 6px #ffffff); border-radius: 999px; opacity: 0;
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        }
        @keyframes tail { 0% { width: 0; } 30% { width: 120px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0) translateY(0) rotateZ(-45deg); opacity: 1; } 100% { transform: translateX(-1000px) translateY(1000px) rotateZ(-45deg); opacity: 0; } }

        #visualizer-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; z-index: 5; pointer-events: none; opacity: 0.6; }
        #visualizer-canvas { width: 100%; height: 100%; }

        /* --- 登入層 --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 60000; background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }
        .login-box {
            background: rgba(0, 0, 0, 0.8); padding: 50px; border-radius: 30px;
            text-align: center; box-shadow: 0 0 30px rgba(79, 195, 247, 0.3);
            border: 1px solid var(--accent-blue); backdrop-filter: blur(15px); color: white;
        }

        /* --- 內容樣式 --- */
        .cursor-dot { width: 10px; height: 10px; background: radial-gradient(circle, var(--accent-blue) 0%, var(--header-color) 100%); position: fixed; top: 0; left: 0; border-radius: 50%; pointer-events: none; z-index: 70000; box-shadow: 0 0 12px var(--accent-blue); }
        header { position: relative; z-index: 10; text-align: center; padding: 40px 0; }
        header h1 { color: #fff; font-size: 3.5rem; letter-spacing: 6px; text-shadow: 0 0 20px rgba(79, 195, 247, 0.8); }
        #quote-display { color: #e1f5fe; font-style: italic; font-size: 1.2rem; min-height: 30px; transition: opacity 0.8s; font-weight: 500; }
        
        .container { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding-bottom: 60px; }
        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; text-align: center; padding-bottom: 25px; opacity: 0; transform: translateY(40px); transition: all 0.4s ease; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); }
        .card.show { opacity: 1; transform: translateY(0); }
        .photo-container { width: 100%; height: 300px; background: #eee; overflow: hidden; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 1.6rem; font-weight: 800; margin-top: 15px; color: #1a2c42; }
        .nickname-tag { display: inline-block; color: #fff; background: var(--header-color); padding: 5px 15px; border-radius: 10px; margin: 10px 0; font-weight: 600;}
        
        /* --- 互動元件 --- */
        .actions { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; }
        .btn-ig { background: var(--ig-gradient); color: white; padding: 8px 18px; border-radius: 50px; text-decoration: none; font-weight: bold; }
        .like-box { display: flex; align-items: center; gap: 5px; background: #ffebee; color: #e91e63; padding: 8px 15px; border-radius: 50px; font-weight: 800; }

        .countdown-container { position: relative; z-index: 10; max-width: 700px; margin: 0 auto 50px; background: var(--card-bg); padding: 25px; border-radius: 25px; border: 2px solid var(--accent-blue); }
        .progress-container { width: 100%; height: 24px; background: rgba(0, 0, 0, 0.2); border-radius: 12px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4fc3f7, #0288d1, #4fc3f7); background-size: 200% 100%; animation: shine 3s linear infinite; box-shadow: 0 0 15px var(--accent-blue); }
        
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; text-align: center; }
        .time-block span { display: block; font-size: 2.2rem; font-weight: 800; color: var(--header-color); }
        
        #music-control { position: fixed; bottom: 20px; right: 20px; z-index: 10000; display: none; background: rgba(0,0,0,0.6); color: white; padding: 10px 15px; border-radius: 50px; align-items: center; gap: 10px; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes shine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

<div class="night-sky">
    <div class="shooting-star" style="top: 5%; left: 80%; animation-delay: 0s;"></div>
    <div class="shooting-star" style="top: 25%; left: 90%; animation-delay: 2.5s;"></div>
</div>

<div id="visualizer-container"><canvas id="visualizer-canvas"></canvas></div>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin-bottom:20px;">歡迎來到 322</h2>
        <input type="password" id="pass-input" placeholder="請輸入密碼" style="padding:10px; border-radius:8px; border:none;" onkeydown="if(event.key==='Enter') checkPass()">
        <br><button onclick="checkPass()" style="margin-top:15px; padding:8px 20px; cursor:none; background:var(--accent-blue); border:none; border-radius:10px;">確認身分</button>
    </div>
</div>

<div id="music-control">
    <span id="music-title">🎵 播放中...</span>
    <button onclick="prevTrack()" style="background:none; border:none; color:white;">⏮</button>
    <button onclick="togglePlay()" id="play-pause-icon" style="background:none; border:none; color:white;">⏸</button>
    <button onclick="nextTrack()" style="background:none; border:none; color:white;">⏭</button>
</div>

<div class="cursor-dot"></div>

<header>
    <h1> 322 憨包們 </h1>
    <div id="quote-display">「 加載憨包回憶中... 」</div>
</header>

<div class="container" id="members-container"></div>

<div class="countdown-container">
    <h3 style="color:var(--header-color); text-align:center; margin-bottom: 20px;">🎓 115 會考倒數計時</h3>
    <div style="text-align: center; margin-bottom: 10px;">
        <div class="progress-container"><div id="progress-bar" class="progress-fill"></div></div>
        <span id="progress-percent" style="font-weight:bold; color:var(--header-color); margin-top:10px; display:block;">數據同步中...</span>
    </div>
    <div id="timer" class="timer-grid">
        <div class="time-block"><span id="days">00</span><p>剩餘天數</p></div>
        <div class="time-block"><span id="hours">00</span><p>小時</p></div>
        <div class="time-block"><span id="minutes">00</span><p>分鐘</p></div>
        <div class="time-block"><span id="seconds">00</span><p>秒數</p></div>
    </div>
</div>

<script>
    // --- 資料配置 ---
    const members = [
        { id: "m1", name: "黃崇瑋", tag: "走步哥", ig: "bennynyhuang", img: "p1.jpg" },
        { id: "m2", name: "林軒漢", tag: "妮塔", ig: "linxuanhan97", img: "p2.jpg" },
        { id: "m3", name: "徐堃翔", tag: "高工候選人", ig: "sean.hsu0930", img: "p3.jpg" },
        { id: "m4", name: "廖廷恩", tag: "大🍼野豬", ig: "ed_331ie", img: "p4.jpg" },
        { id: "m5", name: "蔡承烜", tag: "雨傘哥", ig: "pywb30", img: "p5.jpg" },
        { id: "m6", name: "簡宗翰", tag: "養身籃球", ig: "jzh.10.1015", img: "p6.jpg" },
        { id: "m7", name: "鄭子恩", tag: "導演", ig: "hu.hu7557", img: "p7.jpg" },
        { id: "m8", name: "陳緯哲", tag: "崇瑋 軒漢父親", ig: "a0981848508", img: "p8.jpg" },
        { id: "m9", name: "趙峻霆", tag: "鬍子哥", ig: "venus_tt314", img: "p9.jpg" }
    ];

    const ganHuaQuotes = ["雖然我們是憨包，但我們是全校最帥的憨包。", "只要我不尷尬，尷尬的就是飲水機。", "籃球可以不進，但姿勢一定要帥。", "322 的情義，就像福利社的泡麵——又香又燙。", "今天不讀書，明天變大豬。", "考卷發下來，除了名字其他都是陌生人。", "是種自己的花，愛自己的宇宙。", "老師在講我在聽，但我聽的是心碎的聲音。"];

    // --- Firebase 與 初始化 ---
    const firebaseConfig = {
      apiKey: "AIzaSyAH3XXkYfepg-EfQkFAelq8f7d2Yk9JA74",
      authDomain: "project-1673660731296559126.firebaseapp.com",
      projectId: "project-1673660731296559126",
      databaseURL: "https://project-1673660731296559126-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const audio = new Audio();
    let currentTrack = 0;
    const playlist = Array.from({length: 12}, (_, i) => ({ title: `曲目 ${i+1}`, url: `music${i+1}.mp3` }));

    function renderCards() {
        const container = document.getElementById('members-container');
        members.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="photo-container"><img src="${m.img}"></div><div class="name">${m.name}</div><span class="nickname-tag">${m.tag}</span><div class="actions"><a href="https://www.instagram.com/${m.ig}" class="btn-ig" target="_blank">IG</a><div class="like-box" onclick="addLike('${m.id}')">❤️ <span id="like-count-${m.id}">0</span></div></div>`;
            container.appendChild(card);
            observer.observe(card);
            db.ref('likes/' + m.id).on('value', snap => {
                const el = document.getElementById(`like-count-${m.id}`);
                if (el) el.innerText = snap.val() || 0;
            });
        });
    }

    function addLike(id) { db.ref('likes/' + id).transaction(c => (c || 0) + 1); }

    // --- 倒數核心邏輯 ---
    function updateCountdown() {
        const start = new Date(2025, 8, 1).getTime(); 
        const end = new Date(2026, 4, 16, 8, 0, 0).getTime();
        const now = new Date().getTime();
        const diff = end - now;

        if (diff > 0) {
            document.getElementById('days').innerText = String(Math.floor(diff / 86400000)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
        }
        
        const progress = Math.max(0, Math.min(100, ((now - start) / (end - start)) * 100));
        document.getElementById('progress-bar').style.width = progress.toFixed(4) + '%';
        document.getElementById('progress-percent').innerText = `會考備戰進度：${progress.toFixed(4)}%`;
        requestAnimationFrame(updateCountdown);
    }

    // --- 音樂控制 ---
    function loadMusic(idx) {
        currentTrack = idx;
        audio.src = playlist[idx].url;
        document.getElementById('music-title').innerText = "🎵 " + playlist[idx].title;
    }
    function togglePlay() { 
        if (audio.paused) { audio.play(); document.getElementById('play-pause-icon').innerText = "⏸"; }
        else { audio.pause(); document.getElementById('play-pause-icon').innerText = "▶️"; }
    }
    function nextTrack() { currentTrack = (currentTrack + 1) % playlist.length; loadMusic(currentTrack); audio.play(); }
    function prevTrack() { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadMusic(currentTrack); audio.play(); }

    function checkPass() {
        if (document.getElementById('pass-input').value === "best322") {
            document.getElementById('login-overlay').style.transform = "translateY(-100%)";
            document.getElementById('music-control').style.display = 'flex';
            loadMusic(0); audio.play();
            updateCountdown();
            rotateQuotes();
        } else { alert("暗號錯誤！"); }
    }

    function rotateQuotes() {
        let i = 0;
        setInterval(() => {
            const d = document.getElementById('quote-display');
            d.style.opacity = 0;
            setTimeout(() => { d.innerText = `「 ${ganHuaQuotes[i]} 」`; d.style.opacity = 1; i = (i + 1) % ganHuaQuotes.length; }, 800);
        }, 4000);
    }

    const observer = new IntersectionObserver(es => es.forEach(e => e.isIntersecting && e.target.classList.add('show')));
    const dot = document.querySelector('.cursor-dot');
    window.addEventListener('mousemove', e => { dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px'; });

    window.onload = renderCards;
</script>
</body>
</html>
