<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>322憨包們</title>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<style>
:root {
    --header-color: #0288d1;
    --accent-blue: #4fc3f7;
    --card-bg: rgba(255,255,255,0.85);
}

/* ===== 基本 ===== */
body {
    font-family: 'Microsoft JhengHei', sans-serif;
    background: linear-gradient(-45deg,#050b14,#101d2d,#1a2c42,#050b14);
    background-size: 400% 400%;
    animation: bg 15s ease infinite;
    margin:0;padding:20px;
}

@keyframes bg {
    0%{background-position:0%}
    50%{background-position:100%}
    100%{background-position:0%}
}

header{text-align:center;color:#fff}
header h1{font-size:3rem}

/* ===== 卡片 ===== */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:var(--card-bg);
    border-radius:20px;
    overflow:hidden;
    text-align:center;
    padding-bottom:20px;
}

.photo-container{height:250px}
.photo-container img{width:100%;height:100%;object-fit:cover}

.name{font-size:1.3rem;font-weight:bold}
.nickname-tag{background:#0288d1;color:#fff;padding:4px 10px;border-radius:10px}

.like-box{
    background:#ffebee;
    padding:6px 12px;
    border-radius:20px;
    cursor:pointer;
}

/* ===== 留言板 ===== */
.message-board{
    max-width:700px;
    margin:40px auto;
    background:var(--card-bg);
    padding:20px;
    border-radius:20px;
}

.msg-input-box{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.msg-input-box input{
    flex:1;
    padding:8px;
}

.msg{
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:8px;
}

.msg-name{font-weight:bold;color:#0288d1}
.msg-time{font-size:0.7rem;color:#777}
</style>
</head>

<body>

<header>
<h1>322 憨包們</h1>
</header>

<div class="container" id="members-container"></div>

<!-- 💬 留言板 -->
<div class="message-board">
<h3>💬 留言板</h3>

<div class="msg-input-box">
<input id="msg-name" placeholder="名字">
<input id="msg-text" placeholder="留言..." onkeydown="if(event.key==='Enter') sendMessage()">
<button onclick="sendMessage()">送出</button>
</div>

<div id="messages"></div>
</div>

<script>
/* ===== Firebase ===== */
const firebaseConfig = {
apiKey: "AIzaSyAH3XX",
authDomain: "project-1673660731296559126.firebaseapp.com",
databaseURL: "https://project-1673660731296559126-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ===== 成員 ===== */
const members = [
{ id:"m1", name:"黃崇瑋", tag:"走步哥", ig:"bennynyhuang", img:"p1.jpg"},
{ id:"m2", name:"林軒漢", tag:"妮塔", ig:"linxuanhan97", img:"p2.jpg"}
];

/* ===== 卡片 ===== */
function renderCards(){
const c=document.getElementById("members-container");

members.forEach(m=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=`
<div class="photo-container"><img src="${m.img}"></div>
<div class="name">${m.name}</div>
<div class="nickname-tag">${m.tag}</div>
<div class="like-box" onclick="addLike('${m.id}')">
❤️ <span id="like-${m.id}">0</span>
</div>
`;
c.appendChild(d);

db.ref("likes/"+m.id).on("value",s=>{
document.getElementById("like-"+m.id).innerText=s.val()||0;
});
});
}

/* ===== 按讚（防重複） ===== */
function addLike(id){
if(localStorage.getItem("liked_"+id)){
alert("你按過了！");
return;
}
db.ref("likes/"+id).transaction(c=>(c||0)+1);
localStorage.setItem("liked_"+id,true);
}

/* ===== 留言 ===== */
function sendMessage(){
const name=document.getElementById("msg-name").value.trim();
const text=document.getElementById("msg-text").value.trim();

if(!name||!text){alert("填一下啦");return;}

db.ref("messages").push({
name,text,
time:new Date().toLocaleString()
});

document.getElementById("msg-text").value="";
}

/* ===== 載入留言 ===== */
function loadMessages(){
const box=document.getElementById("messages");

db.ref("messages").limitToLast(50).on("value",snap=>{
box.innerHTML="";
const data=snap.val();
if(!data)return;

Object.values(data).reverse().forEach(m=>{
const d=document.createElement("div");
d.className="msg";
d.innerHTML=`
<div class="msg-name">${m.name}</div>
<div>${m.text}</div>
<div class="msg-time">${m.time}</div>
`;
box.appendChild(d);
});
});
}

/* ===== 啟動 ===== */
window.onload=()=>{
renderCards();
loadMessages();
};
</script>

</body>
</html>
