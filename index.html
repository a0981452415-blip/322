<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>322憨包們</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --header-color: #0288d1;
            --accent-blue: #4fc3f7;
            --card-bg: rgba(255, 255, 255, 0.85);
            --ig-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --bg-gradient: linear-gradient(-45deg, #050b14, #101d2d, #1a2c42, #050b14); 
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            background-attachment: fixed;
            margin: 0; padding: 20px; overflow-x: hidden;
            cursor: none; 
            padding-bottom: 120px;
        }

        /* --- 視覺特效：流星雨 (保留 25 顆) --- */
        .night-sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .shooting-star {
            position: absolute; height: 2px; background: linear-gradient(-45deg, #ffffff, rgba(0, 0, 255, 0));
            filter: drop-shadow(0 0 6px #ffffff); border-radius: 999px; opacity: 0;
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        }
        /* 流星 nth-child 略 (保留你原本的所有動畫設定) */
        @keyframes tail { 0% { width: 0; } 30% { width: 120px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0) translateY(0) rotateZ(-45deg); opacity: 1; } 100% { transform: translateX(-1000px) translateY(1000px) rotateZ(-45deg); opacity: 0; } }

        /* --- 登入介面 --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 60000; background: var(--bg-gradient); display: flex; justify-content: center; align-items: center; transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1); }
        .login-box { background: rgba(0, 0, 0, 0.8); padding: 50px; border-radius: 30px; text-align: center; box-shadow: 0 0 30px rgba(79, 195, 247, 0.3); border: 1px solid var(--accent-blue); backdrop-filter: blur(15px); color: white; }
        .typewriter-text { font-family: 'Courier New', Courier, monospace; overflow: hidden; border-right: .15em solid var(--accent-blue); white-space: nowrap; margin: 0 auto 20px; letter-spacing: .15em; width: 0; font-size: 1.8rem; font-weight: bold; animation: typing 2s steps(10, end) forwards, blink-caret .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--accent-blue) } }
        .login-box input { background: rgba(255,255,255,0.1); color: white; padding: 12px; width: 220px; border-radius: 12px; border: 1px solid var(--accent-blue); margin: 20px 0; font-size: 1.1rem; text-align: center; outline: none; }
        
        /* --- 滑鼠特效 --- */
        .cursor-dot { width: 10px; height: 10px; background: radial-gradient(circle, var(--accent-blue) 0%, var(--header-color) 100%); position: fixed; top: 0; left: 0; border-radius: 50%; pointer-events: none; z-index: 70000; box-shadow: 0 0 12px var(--accent-blue); }
        
        /* --- 內容樣式 --- */
        header { position: relative; z-index: 10; text-align: center; padding: 40px 0; }
        header h1 { color: #fff; font-size: 3.5rem; letter-spacing: 6px; text-shadow: 0 0 20px rgba(79, 195, 247, 0.8); margin-bottom: 10px;}
        #quote-display { color: #e1f5fe; font-style: italic; font-size: 1.2rem; min-height: 30px; transition: opacity 0.8s ease; text-shadow: 0 0 10px rgba(79, 195, 247, 0.5); font-weight: 500; }
        
        .container { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; padding-bottom: 60px; }
        .card { background: var(--card-bg); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; padding-bottom: 25px; opacity: 0; transform: translateY(40px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.4); }
        .card.show { opacity: 1; transform: translateY(0); }
        
        .photo-container { width: 100%; height: 300px; background: #eee; overflow: hidden; }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 1.6rem; font-weight: 800; margin-top: 15px; color: #1a2c42; }
        .nickname-tag { display: inline-block; color: #fff; background: var(--header-color); padding: 5px 15px; border-radius: 10px; margin: 10px 0; font-weight: 600;}
        .actions { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 10px; }
        .btn-ig { display: inline-block; background: var(--ig-gradient); color: white; padding: 8px 18px; border-radius: 50px; text-decoration: none; font-weight: bold; border: none; font-size: 0.9rem; transition: transform 0.2s; }
        .btn-ig:hover { transform: scale(1.1); }
        .like-box { display: flex; align-items: center; gap: 5px; background: #ffebee; color: #e91e63; padding: 8px 15px; border-radius: 50px; font-weight: 800; cursor: none; transition: transform 0.2s ease; border: 1px solid #ffcdd2; }

        /* --- 模組容器 --- */
        .module-container { position: relative; z-index: 10; max-width: 700px; margin: 0 auto 30px; background: var(--card-bg); padding: 25px; border-radius: 25px; border: 2px solid var(--accent-blue); backdrop-filter: blur(10px); text-align: center; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .time-block { background: rgba(2, 136, 209, 0.1); padding: 10px; border-radius: 12px; }
        .time-block span { display: block; font-size: 2rem; font-weight: 800; color: var(--header-color); }
        
        /* 語錄框樣式 */
        #random-quote-box { margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.5); border-radius: 15px; min-height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #0277bd; border: 1px dashed var(--accent-blue); transition: all 0.3s; }

        #message-list { max-height: 250px; overflow-y: auto; margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.05); border-radius: 15px; }
        .msg-item { background: white; padding: 10px 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); animation: fadeIn 0.5s ease; text-align: left; }

        /* --- 音樂播放器 (佔滿底部) --- */
        #music-player { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 80px; z-index: 9999; 
            background: rgba(10, 20, 35, 0.95); padding: 0 40px; color: white; 
            backdrop-filter: blur(15px); border-top: 2px solid var(--accent-blue); 
            display: none; align-items: center; justify-content: space-between; box-sizing: border-box;
        }
        .visualizer { display: flex; align-items: flex-end; gap: 3px; height: 25px; width: 40px; }
        .visualizer .bar { width: 4px; background: var(--accent-blue); border-radius: 2px; height: 20%; transition: 0.2s; }
        .playing .bar { animation: bar-bounce 0.6s ease-in-out infinite alternate; }
        .playing .bar:nth-child(1) { animation-delay: 0.1s; }
        .playing .bar:nth-child(2) { animation-delay: 0.3s; }
        .playing .bar:nth-child(3) { animation-delay: 0.2s; }
        .playing .bar:nth-child(4) { animation-delay: 0.4s; }
        @keyframes bar-bounce { from { height: 20%; } to { height: 100%; } }
        .music-ctrl { background: none; border: none; color: white; font-size: 1.5rem; cursor: none; padding: 0 10px; }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        a, button, input, .like-box, .music-ctrl { cursor: none !important; }
    </style>
</head>
<body>

<div class="night-sky" id="star-container">
    </div>

<div id="login-overlay">
    <div class="login-box">
        <div class="typewriter-text">歡迎來到 322</div>
        <input type="password" id="pass-input" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter') checkPass()">
        <br><button class="btn-ig" onclick="checkPass()">確認身分</button>
    </div>
</div>

<div class="cursor-dot"></div><div class="cursor-dot"></div>

<header>
    <h1> 322 憨包們 </h1>
    <div id="quote-display">「 加載憨包回憶中... 」</div>
</header>

<div class="container" id="members-container"></div>

<div class="module-container">
    <h3 style="color:var(--header-color);">🎓 115 會考倒數計時</h3>
    <div id="timer" class="timer-grid">
        <div class="time-block"><span id="days">00</span><p>天</p></div>
        <div class="time-block"><span id="hours">00</span><p>時</p></div>
        <div class="time-block"><span id="minutes">00</span><p>分</p></div>
        <div class="time-block"><span id="seconds">00</span><p>秒</p></div>
    </div>
</div>

<div class="module-container">
    <h3 style="color:var(--header-color);">🃏 憨包語錄翻牌</h3>
    <div id="random-quote-box">點擊下方按鈕抽一句經典語錄...</div>
    <button class="btn-ig" onclick="drawQuote()">隨機抽一句</button>
</div>

<div class="module-container">
    <h3 style="color:var(--header-color);"> 憨包留言板</h3>
    <div id="message-list"></div>
    <div style="display: flex; gap: 10px;">
        <input type="text" id="user-name" placeholder="大名" style="width: 80px; padding: 10px; border-radius: 10px; border: 1px solid #ccc;">
        <input type="text" id="user-msg" placeholder="留句幹話吧..." style="flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ccc;">
        <button onclick="postMessage()" style="padding: 10px 15px; background: var(--header-color); color: white; border: none; border-radius: 10px; font-weight: bold;">發送</button>
    </div>
</div>

<div id="music-player">
    <div class="visualizer" id="viz-left">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; min-width: 200px;">
        <span id="current-track-name" style="font-size: 0.85rem; margin-bottom: 5px; opacity: 0.9;">🎵 曲目 1</span>
        <div style="display: flex; align-items: center;">
            <button class="music-ctrl" onclick="prevSong()">⏮</button>
            <button id="play-btn" class="music-ctrl" onclick="toggleMusic()">▶️</button>
            <button class="music-ctrl" onclick="nextSong()">⏭</button>
        </div>
    </div>
    <div class="visualizer" id="viz-right">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
</div>

<script>
    // --- Firebase 配置 (保留你的 Key) ---
    const firebaseConfig = {
      apiKey: "AIzaSyAH3XXkYfepg-EfQkFAelq8f7d2Yk9JA74",
      authDomain: "project-1673660731296559126.firebaseapp.com",
      projectId: "project-1673660731296559126",
      databaseURL: "https://project-1673660731296559126-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ganHuaQuotes = ["雖然我們是憨包，但我們是全校最帥的憨包。", "只要我不尷尬，尷尬的就是飲水機。", "322 的情義，就像福利社的泡麵——又香又燙。", "今天不讀書，明天變大豬。", "老師在講我在聽，但我聽的是心碎的聲音。", "（某某某）又在走步了，裁判沒看到嗎？", "青春不是雪，而是熬過不屬於自己的季節。"];
    
    // 成員資料 (保留)
    const members = [
        { id: "m1", name: "黃崇瑋", tag: "走步哥", ig: "bennynyhuang", img: "p1.jpg" },
        { id: "m2", name: "林軒漢", tag: "妮塔", ig: "linxuanhan97", img: "p2.jpg" },
        { id: "m3", name: "徐堃翔", tag: "高工候選人", ig: "sean.hsu0930", img: "p3.jpg" },
        { id: "m4", name: "廖廷恩", tag: "大🍼野豬", ig: "ed_331ie", img: "p4.jpg" },
        { id: "m5", name: "蔡承烜", tag: "雨傘哥", ig: "pywb30", img: "p5.jpg" },
        { id: "m6", name: "簡宗翰", tag: "養身籃球", ig: "jzh.10.1015", img: "p6.jpg" },
        { id: "m7", name: "鄭子恩", tag: "導演", ig: "hu.hu7557", img: "p7.jpg" },
        { id: "m8", name: "陳緯哲", tag: "崇瑋 軒漢父親", ig: "a0981848508", img: "p8.jpg" },
        { id: "m9", name: "趙峻霆", tag: "鬍子哥", ig: "venus_tt314", img: "p9.jpg" }
    ];

    // --- 新增：語錄隨機抽取函數 ---
    function drawQuote() {
        const box = document.getElementById('random-quote-box');
        box.style.opacity = 0;
        setTimeout(() => {
            const rand = ganHuaQuotes[Math.floor(Math.random() * ganHuaQuotes.length)];
            box.innerText = rand;
            box.style.opacity = 1;
        }, 300);
    }

    // --- 音樂邏輯 (保留並優化小柱子) ---
    const playlist = Array.from({length: 12}, (_, i) => `music${i+1}.mp3`);
    let currentTrackIndex = 0;
    const audio = new Audio();
    audio.src = playlist[currentTrackIndex];

    function updateTrackUI() { document.getElementById('current-track-name').innerText = `🎵 曲目 ${currentTrackIndex + 1}`; }
    
    function updateVisualizer(isPlaying) {
        const bars = document.querySelectorAll('.visualizer');
        bars.forEach(v => isPlaying ? v.classList.add('playing') : v.classList.remove('playing'));
    }

    function toggleMusic() {
        const btn = document.getElementById('play-btn');
        if (audio.paused) { 
            audio.play(); btn.innerText = "⏸"; updateVisualizer(true);
        } else { 
            audio.pause(); btn.innerText = "▶️"; updateVisualizer(false);
        }
    }

    function nextSong() {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        audio.src = playlist[currentTrackIndex]; audio.play();
        document.getElementById('play-btn').innerText = "⏸"; updateTrackUI(); updateVisualizer(true);
    }

    function prevSong() {
        currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
        audio.src = playlist[currentTrackIndex]; audio.play();
        document.getElementById('play-btn').innerText = "⏸"; updateTrackUI(); updateVisualizer(true);
    }
    audio.onended = nextSong;

    // --- 留言板邏輯 (完整保留) ---
    function postMessage() {
        const nInput = document.getElementById('user-name'), mInput = document.getElementById('user-msg');
        if (!mInput.value.trim()) return;
        db.ref('messages').push({ name: nInput.value.trim() || "匿名憨包", content: mInput.value.trim(), ts: Date.now() });
        mInput.value = "";
    }
    db.ref('messages').limitToLast(10).on('value', snap => {
        const list = document.getElementById('message-list'); list.innerHTML = "";
        const data = snap.val();
        if (data) Object.values(data).reverse().forEach(m => {
            list.innerHTML += `<div class="msg-item"><strong>${m.name}</strong>: ${m.content}</div>`;
        });
    });

    // --- 核心系統 (保留) ---
    function checkPass() {
        if (document.getElementById('pass-input').value === "best322") { 
            document.getElementById('login-overlay').style.transform = "translateY(-100%)";
            document.getElementById('music-player').style.display = 'flex';
            rotateQuotes(); updateTrackUI();
        } else { alert("抱歉你不是322憨包:?"); }
    }

    function rotateQuotes() {
        const d = document.getElementById('quote-display'); let i = 0;
        setInterval(() => {
            d.style.opacity = 0;
            setTimeout(() => { d.innerText = `「 ${ganHuaQuotes[i]} 」`; d.style.opacity = 1; i = (i + 1) % ganHuaQuotes.length; }, 800);
        }, 4500);
    }

    function renderCards() {
        const container = document.getElementById('members-container');
        members.forEach(m => {
            const card = document.createElement('div'); card.className = 'card';
            card.innerHTML = `<div class="photo-container"><img src="${m.img}"></div><div class="info"><div class="name">${m.name}</div><span class="nickname-tag">${m.tag}</span><div class="actions"><a href="https://www.instagram.com/${m.ig}" class="btn-ig" target="_blank">IG</a><div class="like-box" onclick="addLike('${m.id}')">❤️ <span id="like-${m.id}">0</span></div></div></div>`;
            container.appendChild(card); observer.observe(card);
            db.ref('likes/'+m.id).on('value', s => { document.getElementById(`like-${m.id}`).innerText = s.val() || 0; });
        });
    }

    function addLike(id) { db.ref('likes/'+id).transaction(c => (c || 0) + 1); }

    function updateCountdown() {
        const end = new Date(2026, 4, 16, 8, 0).getTime(); const diff = end - Date.now();
        if (diff > 0) {
            document.getElementById('days').innerText = String(Math.floor(diff / 86400000)).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % 86400000) / 3600000)).padStart(2, '0');
            document.getElementById('minutes').innerText = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            document.getElementById('seconds').innerText = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
        }
    }

    const observer = new IntersectionObserver(es => es.forEach(e => e.isIntersecting && e.target.classList.add('show')));
    const dots = document.querySelectorAll('.cursor-dot');
    window.addEventListener('mousemove', e => {
        dots.forEach((dot, i) => { setTimeout(() => { dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px'; }, i * 50); });
    });

    setInterval(updateCountdown, 1000);
    window.onload = () => { renderCards(); updateCountdown(); };
</script>
</body>
</html>
